services:
  # ──── API Gateway ────────────────────────────────────────
  kong:
    image: kong:3.9
    container_name: mediconnect-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    volumes:
      - ./kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - "8000:8000"   # Proxy – all API traffic
      - "8001:8001"   # Admin API
    restart: on-failure

  # ──── Core Services (no host ports – routed through Kong) ─
  consultation-service:
    build: ./backend/consultation-service
    env_file: ./backend/consultation-service/.env

  amazon-s3-wrapper:
    build: ./backend/amazon-s3-wrapper
    container_name: amazon-s3-wrapper
    env_file: ./backend/amazon-s3-wrapper/.env

  mc-service:
    build: ./backend/mc-service
    env_file: ./backend/mc-service/.env
    environment:
      - S3_WRAPPER_URL=http://amazon-s3-wrapper:5022
    depends_on:
      - amazon-s3-wrapper

  twilio-wrapper:
    build: ./backend/twilio-wrapper
    env_file: ./backend/twilio-wrapper/.env

  openai-wrapper:
    build: ./backend/openai-wrapper
    env_file: ./backend/openai-wrapper/.env

  distance-matrix-wrapper:
    build: ./backend/distance-matrix-wrapper
    container_name: distance-matrix-wrapper
    env_file:
      - ./backend/distance-matrix-wrapper/.env

  notification-wrapper:
    build: ./backend/notification_wrapper
    env_file: ./backend/notification_wrapper/.env
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672/}
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5032
      - PATIENT_SERVICE_URL=http://patient-service:5030
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - rabbitmq
      - appointment-service
      - patient-service
      - redis

  start-consultation:
    build: ./backend/start-consultation-composite
    env_file: ./backend/start-consultation-composite/.env
    depends_on:
      - consultation-service
      - twilio-wrapper

  complete-consultation:
    build: ./backend/complete-consultation-composite
    env_file: ./backend/complete-consultation-composite/.env
    environment:
      - PATIENT_SERVICE_URL=http://patient-service:5030
    depends_on:
      - consultation-service
      - openai-wrapper
      - mc-service
      - notification-wrapper
      - patient-service

  # ──── Message Queue ──────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: mediconnect-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediconnect-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──── Payment Services ───────────────────────────────────
  payment_atomic:
    build:
      context: ./backend/payment_atomic
    container_name: payment_atomic_api
    environment:
      - PYTHONUNBUFFERED=1
      - FIREBASE_CRED_PATH=./serviceAccountKey.json
    networks:
      default:
        aliases:
          - payment-atomic

  payment_wrapper:
    build:
      context: ./backend/payment_wrapper
    container_name: payment_wrapper_api
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./backend/payment_wrapper/.env
    networks:
      default:
        aliases:
          - payment-wrapper

  process_payment:
    build:
      context: ./backend/process_payment_composite
    container_name: process_payment_api
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - PAYMENT_WRAPPER_URL=http://payment-wrapper:5001
      - PAYMENT_ATOMIC_URL=http://payment-atomic:5000
      - ORDER_URL=https://personal-wi9fn0qz.outsystemscloud.com/Order_Service/rest/OrderAPI
      - PATIENT_URL=http://patient-service:5030
    depends_on:
      rabbitmq:
        condition: service_healthy
      payment_atomic:
        condition: service_started
      payment_wrapper:
        condition: service_started
    restart: on-failure
    networks:
      default:
        aliases:
          - process-payment

  process_payment_worker:
    build:
      context: ./backend/process_payment_composite
    container_name: process_payment_worker
    command: ["python", "refund_worker.py"]
    # No ports exposed as this is a background worker pulling from the queue
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - PAYMENT_WRAPPER_URL=http://payment-wrapper:5001
      - PAYMENT_ATOMIC_URL=http://payment-atomic:5000
      - ORDER_URL=https://personal-wi9fn0qz.outsystemscloud.com/Order_Service/rest/OrderAPI
      - PATIENT_URL=http://patient-service:5030
      - DELIVERY_SERVICE_URL=http://delivery-service:5000
    depends_on:
      rabbitmq:
        condition: service_healthy
      payment_atomic:
        condition: service_started
      payment_wrapper:
        condition: service_started
    restart: on-failure
    networks:
      - default

  # ──── Domain Services ────────────────────────────────────
  patient-service:
    build: ./backend/patient-service
    container_name: patient-service

  telegram-wrapper:
    build: ./backend/telegram_wrapper
    container_name: telegram-wrapper
    env_file: ./backend/telegram_wrapper/.env
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672/}
      - PATIENT_SERVICE_URL=http://patient-service:5030
    depends_on:
      rabbitmq:
        condition: service_healthy
      patient-service:
        condition: service_started

  doctor-service:
    build: ./backend/doctor-service
    container_name: doctor-service

  appointment-service:
    build: ./backend/appointment-service
    container_name: appointment-service

  book-appointment:
    build: ./backend/book-appointment
    container_name: book-appointment
    environment:
      - PATIENT_SERVICE_URL=http://patient-service:5030
      - DOCTOR_SERVICE_URL=http://doctor-service:5031
      - APPOINTMENT_SERVICE_URL=http://appointment-service:5032
      - NOTIFICATION_WRAPPER_URL=http://notification-wrapper:5011
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672/}
      - REDIS_URL=redis://redis:6379/0
      - SSE_SERVICE_URL=http://notification-wrapper:5011
      - OPENAI_WRAPPER_URL=http://openai-wrapper:5021
    depends_on:
      - patient-service
      - doctor-service
      - appointment-service
      - notification-wrapper
      - openai-wrapper
      - redis

  inventory-service:
    build: ./backend/inventory
    container_name: inventory-service
    env_file: ./backend/inventory/.env
    environment:
      - S3_WRAPPER_URL=http://amazon-s3-wrapper:5022
    depends_on:
      - amazon-s3-wrapper

  # ──── Delivery Services ──────────────────────────────────
  delivery-service:
    build: ./backend/delivery-service
    container_name: delivery-service

  rider-service:
    build: ./backend/rider-service
    container_name: rider-service

  assign-delivery:
    build: ./backend/assign-delivery-service
    container_name: assign-delivery
    environment:
      - DELIVERY_URL=http://delivery-service:5000
      - RIDER_URL=http://rider-service:5001
      - TRACKING_URL=http://tracking-service:5050
      - DISTANCE_MATRIX_WRAPPER_URL=http://distance-matrix-wrapper:5063
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672/}
    depends_on:
      - delivery-service
      - rider-service
      - tracking-service
      - distance-matrix-wrapper

  complete-delivery:
    build: ./backend/complete-delivery-service
    container_name: complete-delivery
    environment:
      - DELIVERY_URL=http://delivery-service:5000
      - RIDER_URL=http://rider-service:5001
      - ORDER_URL=https://personal-wi9fn0qz.outsystemscloud.com/Order_Service/rest/OrderAPI
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672/}
    depends_on:
      - delivery-service

  tracking-service:
    build: ./backend/tracking-service
    container_name: tracking-service
    environment:
      - DELIVERY_SERVICE_URL=http://delivery-service:5000
      - RIDER_SERVICE_URL=http://rider-service:5001
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672/}
    depends_on:
      rabbitmq:
        condition: service_healthy
      delivery-service:
        condition: service_started
      rider-service:
        condition: service_started

  # ──── Frontend ───────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: mediconnect-frontend
    ports:
      - "8080:8080"
    environment:
      # All API traffic routed through Kong API Gateway on port 8000
      - PATIENT_SERVICE_URL=http://localhost:8000
      - DOCTOR_SERVICE_URL=http://localhost:8000
      - APPT_SERVICE_URL=http://localhost:8000
      - BOOK_APPOINTMENT_URL=http://localhost:8000
      - CONSULTATION_SERVICE_URL=http://localhost:8000
      - START_CONSULTATION_URL=http://localhost:8000
      - COMPLETE_CONSULTATION_URL=http://localhost:8000
      - INV_SERVICE_URL=http://localhost:8000
      - MC_SERVICE_URL=http://localhost:8000
      - TWILIO_WRAPPER_URL=http://localhost:8000
      - OPENAI_WRAPPER_URL=http://localhost:8000
      - NOTIFICATION_WRAPPER_URL=http://localhost:8000
      - SSE_SERVICE_URL=http://localhost:8000
      # Payment services use Kong path prefixes to resolve /payment/* conflicts
      - PAYMENT_SERVICE_URL=http://localhost:8000/payment-svc
      - PAYMENT_WRAPPER_URL=http://localhost:8000/payment-gateway
      - PROCESS_PAYMENT_URL=http://localhost:8000
      - DELIVERY_SERVICE_URL=http://localhost:8000
      - RIDER_SERVICE_URL=http://localhost:8000
      - ASSIGN_DELIVERY_URL=http://localhost:8000
      - COMPLETE_DELIVERY_URL=http://localhost:8000
      # External service (not routed through Kong)
      - ORDER_SERVICE_URL=https://personal-wi9fn0qz.outsystemscloud.com/Order_Service/rest/OrderAPI
      # Firebase
      - FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      - FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
      - FIREBASE_APP_ID=${FIREBASE_APP_ID}
    depends_on:
      - kong
