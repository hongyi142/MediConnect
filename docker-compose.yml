version: "3.8"
services:
  frontend:
    build: ./frontend
    ports: ["8080:8080"]
    env_file: ./frontend/.env
    depends_on:
      - start-consultation
      - complete-consultation
      - consultation-service

  consultation-service:
    build: ./consultation-service
    ports: ["5004:5004"]
    env_file: ./consultation-service/.env

  mc-service:
    build: ./mc-service
    ports: ["5010:5010"]
    env_file: ./mc-service/.env

  twilio-wrapper:
    build: ./twilio-wrapper
    ports: ["5020:5020"]
    env_file: ./twilio-wrapper/.env

  openai-wrapper:
    build: ./openai-wrapper
    ports: ["5021:5021"]
    env_file: ./openai-wrapper/.env

  notification-wrapper:
    build: ./notification_wrapper
    ports: ["5011:5011"]
    env_file: ./notification_wrapper/.env

  start-consultation:
    build: ./start-consultation
    ports: ["5013:5013"]
    env_file: ./start-consultation/.env
    depends_on:
      - consultation-service
      - twilio-wrapper

  complete-consultation:
    build: ./complete-consultation
    ports: ["5014:5014"]
    env_file: ./complete-consultation/.env
    depends_on:
      - consultation-service
      - openai-wrapper
      - mc-service
      - notification-wrapper

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mediconnect-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  payment_atomic:
    build:
      context: ./payment_atomic
    container_name: payment_atomic_api
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    # Note: Requires FIREBASE_CRED_PATH pointing to an attached volume in production

  payment_wrapper:
    build:
      context: ./payment_wrapper
    container_name: payment_wrapper_api
    ports:
      - "5001:5001"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./payment_wrapper/.env # Load external API keys like Stripe safely

  process_payment:
    build:
      context: ./process_payment_composite
    container_name: process_payment_api
    ports:
      - "5002:5002"
    environment:
      - PYTHONUNBUFFERED=1
      # Overriding env variables for internal Docker DNS routing
      - RABBITMQ_URL=amqp://rabbitmq/
      - PAYMENT_WRAPPER_URL=http://payment_wrapper:5001
      - PAYMENT_ATOMIC_URL=http://payment_atomic:5000
    depends_on:
      rabbitmq:
        condition: service_healthy
      payment_atomic:
        condition: service_started
      payment_wrapper:
        condition: service_started

  process_payment_worker:
    build:
      context: ./process_payment_composite
    container_name: process_payment_worker
    command: ["python", "refund_worker.py"]
    # No ports exposed as this is a background worker pulling from the queue
    environment:
      - PYTHONUNBUFFERED=1
      # Overriding env variables for internal Docker DNS routing
      - RABBITMQ_URL=amqp://rabbitmq/
      - PAYMENT_WRAPPER_URL=http://payment_wrapper:5001
      - PAYMENT_ATOMIC_URL=http://payment_atomic:5000
    depends_on:
      rabbitmq:
        condition: service_healthy
      payment_atomic:
        condition: service_started
      payment_wrapper:
        condition: service_started

  notification_worker:
    build:
      context: ./notification_wrapper
    container_name: notification_worker
    command: ["python", "worker.py"]
    # No ports exposed as this is a background worker pulling from the queue
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_URL=amqp://rabbitmq/ 
    env_file:
      - ./notification_wrapper/.env # Load SMU keys 
    depends_on:
      rabbitmq:
        condition: service_healthy
