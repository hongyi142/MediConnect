<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MediConnect{% endblock %}</title>

  <!-- Google Fonts - Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="/static/css/main.css">


  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- Hidden service-config element -->
  <div id="svc-config" style="display:none"
    data-patient-url="{{ PATIENT_SERVICE_URL }}"
    data-doctor-url="{{ DOCTOR_SERVICE_URL }}"
    data-appt-url="{{ APPT_SERVICE_URL }}"
    data-consultation-url="{{ CONSULTATION_SERVICE_URL }}"
    data-order-url="{{ ORDER_SERVICE_URL }}"
    data-inv-url="{{ INV_SERVICE_URL }}"
    data-payment-url="{{ PAYMENT_SERVICE_URL }}"
    data-delivery-url="{{ DELIVERY_SERVICE_URL }}"
    data-rider-url="{{ RIDER_SERVICE_URL }}"
    data-mc-url="{{ MC_SERVICE_URL }}"
    data-twilio-url="{{ TWILIO_WRAPPER_URL }}"
    data-openai-url="{{ OPENAI_WRAPPER_URL }}"
    data-payment-wrapper-url="{{ PAYMENT_WRAPPER_URL }}"
    data-start-consultation-url="{{ START_CONSULTATION_URL }}"
    data-complete-consultation-url="{{ COMPLETE_CONSULTATION_URL }}"
    data-book-appointment-url="{{ BOOK_APPOINTMENT_URL }}"
    data-process-payment-url="{{ PROCESS_PAYMENT_URL }}"
    data-assign-delivery-url="{{ ASSIGN_DELIVERY_URL }}"
    data-complete-delivery-url="{{ COMPLETE_DELIVERY_URL }}"
    data-notification-url="{{ NOTIFICATION_WRAPPER_URL }}"
    data-sse-url="{{ SSE_SERVICE_URL }}"
  ></div>

  <!-- Firebase compat SDK 10.12.0 – loaded in <body> so they don't block <head> parsing -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Firebase initialisation -->
  <script>
    const firebaseConfig = {
      apiKey: "{{ FIREBASE_API_KEY }}",
      authDomain: "{{ FIREBASE_AUTH_DOMAIN }}",
      projectId: "{{ FIREBASE_PROJECT_ID }}",
      storageBucket: "{{ FIREBASE_STORAGE_BUCKET }}",
      messagingSenderId: "{{ FIREBASE_MESSAGING_SENDER_ID }}",
      appId: "{{ FIREBASE_APP_ID }}"
    };
    firebase.initializeApp(firebaseConfig);
    const fbAuth = firebase.auth();
    const fbDb = firebase.firestore();
  </script>

  <!-- Navbar -->
  {% set show_navbar = show_navbar if show_navbar is defined else true %}
  {% block navbar %}
  <nav class="navbar" id="main-navbar" style="{% if not show_navbar %}display:none{% endif %}">
    <a href="/" class="navbar-brand" id="nav-brand">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="8" fill="#D97757"/>
        <path d="M16 7v18M7 16h18" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      </svg>
      MediConnect
    </a>
    <div class="navbar-links" id="nav-links"></div>
    <div class="navbar-user">
      <div class="navbar-avatar" id="nav-avatar"></div>
      <span class="navbar-name" id="nav-name"></span>
      <span id="nav-role" class="role-badge"></span>
      <button class="navbar-logout" id="nav-logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;vertical-align:-2px"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </nav>
  {% endblock %}

  <!-- Main content -->
  {% block content %}{% endblock %}

  <!-- Toast container -->
  <div id="toast-container" style="position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:var(--z-toast, 500);"></div>

  <!-- Dynamic Background (default: subtle mesh) -->
  {% block dynamic_bg %}
  <div class="bg-mesh-subtle">
    <div class="bg-mesh-blob bg-mesh-blob-1"></div>
    <div class="bg-mesh-blob bg-mesh-blob-2"></div>
    <div class="bg-mesh-blob bg-mesh-blob-3"></div>
  </div>
  {% endblock %}

  <!-- Navbar auth-state listener + scroll effect -->
  <script>
    (function() {
      var navbar = document.getElementById("main-navbar");
      if (navbar) {
        window.addEventListener("scroll", function() {
          if (window.scrollY > 8) navbar.classList.add("scrolled");
          else navbar.classList.remove("scrolled");
        });
      }
    })();

    function roleHomePath(role) {
      if (role === "patient") return "/patient/dashboard";
      if (role === "doctor") return "/doctor/dashboard";
      if (role === "rider") return "/rider/dashboard";
      return "/";
    }

    function roleNavLinks(role) {
      if (role === "patient") {
        return [
          { label: "Dashboard", href: "/patient/dashboard" },
          { label: "Book", href: "/patient/book" },
          { label: "Appointments", href: "/patient/appointments" },
          { label: "History", href: "/patient/history" }
        ];
      }
      if (role === "doctor") {
        return [
          { label: "Dashboard", href: "/doctor/dashboard" },
          { label: "Schedule", href: "/doctor/schedule" },
          { label: "Consult", href: "/doctor/join" },
          { label: "Inventory", href: "/doctor/inventory" }
        ];
      }
      if (role === "rider") {
        return [
          { label: "Dashboard", href: "/rider/dashboard" },
          { label: "Delivery", href: "/rider/delivery" }
        ];
      }
      return [];
    }

    function roleSettingsLinks(role) {
      if (!role) return [];
      return [{ label: "Settings", href: "/account/settings" }];
    }

    function renderNavLinks(role) {
      var container = document.getElementById("nav-links");
      if (!container) return;
      var links = roleNavLinks(role).concat(roleSettingsLinks(role));
      var path = window.location.pathname || "/";
      container.innerHTML = links.map(function(link) {
        var active = path === link.href || path.indexOf(link.href + "/") === 0;
        return '<a class="navbar-link' + (active ? ' active' : '') + '" href="' + link.href + '">' + link.label + '</a>';
      }).join("");
    }

    // Shared promise so page scripts can await the same Firestore read instead of re-fetching.
    window._userDocPromise = null;

    fbAuth.onAuthStateChanged(async function(firebaseUser) {
      var navName = document.getElementById("nav-name");
      var navRole = document.getElementById("nav-role");
      var navAvatar = document.getElementById("nav-avatar");
      var navLogout = document.getElementById("nav-logout");
      var navBrand = document.getElementById("nav-brand");
      var navLinks = document.getElementById("nav-links");
      var navbar = document.getElementById("main-navbar");

      if (!firebaseUser) {
        window.currentUser = null;
        window._userDocPromise = null;
        if (navbar) navbar.style.display = "none";
        if (navBrand) navBrand.setAttribute("href", "/");
        if (navLinks) navLinks.innerHTML = "";
        return;
      }
      if (navbar && navbar.style.display !== "none") {
        navbar.style.display = "";
      }

      // Cache the Firestore read as a promise so page scripts can share it.
      if (!window._userDocPromise) {
        window._userDocPromise = fbDb.collection("users").doc(firebaseUser.uid).get();
      }
      var snap = await window._userDocPromise;
      if (!snap.exists) return;
      var user = snap.data();
      window.currentUser = user;

      if (navName) navName.textContent = user.name;
      if (navAvatar) {
        var initials = (user.name || "U").split(" ").map(function(w){ return w[0]; }).join("").toUpperCase().slice(0, 2);
        navAvatar.textContent = initials;
      }
      if (navRole) {
        navRole.textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
        navRole.className = "role-badge role-" + user.role;
      }
      if (navBrand) navBrand.setAttribute("href", roleHomePath(user.role));
      renderNavLinks(user.role);
    });

    document.getElementById("nav-logout").addEventListener("click", function() {
      fbAuth.signOut().then(function() { window.location.href = "/"; });
    });
  </script>

  <!-- Utility JS helpers -->
  <script>
    function showToast(message, type) {
      type = type || "success";
      var container = document.getElementById("toast-container");
      var toast = document.createElement("div");

      var icon = type === "error"
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';

      var bgColor = type === "error" ? "var(--danger, #ef4444)" : "var(--success, #059669)";

      toast.innerHTML = icon + '<span>' + message + '</span>';
      toast.style.cssText =
        "display:flex;align-items:center;gap:10px;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:500;" +
        "color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.16);opacity:0;transform:translateY(12px);" +
        "transition:opacity .3s,transform .3s;background:" + bgColor + ";";
      container.appendChild(toast);

      requestAnimationFrame(function() {
        toast.style.opacity = "1";
        toast.style.transform = "translateY(0)";
      });
      setTimeout(function() {
        toast.style.opacity = "0";
        toast.style.transform = "translateY(12px)";
        setTimeout(function() { toast.remove(); }, 300);
      }, 3500);
    }

    function fmtDate(val) {
      var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      if (typeof val === "string" && /^\d{4}-\d{2}-\d{2}$/.test(val)) {
        var p = val.split("-");
        return p[2] + " " + months[parseInt(p[1], 10) - 1] + " " + p[0];
      }
      var d = (val instanceof Date) ? val : new Date(val);
      if (isNaN(d.getTime())) return String(val);
      return d.getDate().toString().padStart(2, "0") + " " + months[d.getMonth()] + " " + d.getFullYear();
    }

    function showError(container, message) {
      clearError(container);
      var el = typeof container === "string" ? document.getElementById(container) : container;
      if (!el) return;
      var banner = document.createElement("div");
      banner.className = "error-banner";
      banner.innerHTML =
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
        '<span>' + message + '</span>';
      banner.style.cssText =
        "display:flex;align-items:flex-start;gap:10px;background:var(--danger-bg,#fef2f2);color:var(--danger,#DC2626);" +
        "border:1px solid var(--danger-light,#fecaca);border-radius:10px;padding:12px 16px;margin-bottom:16px;" +
        "font-size:14px;line-height:1.5;animation:fadeIn .2s ease-out;";
      el.prepend(banner);
    }

    function clearError(container) {
      var el = typeof container === "string" ? document.getElementById(container) : container;
      if (!el) return;
      var existing = el.querySelector(".error-banner");
      if (existing) existing.remove();
    }

    function setLoading(btn, loading) {
      if (!btn) return;
      if (loading) {
        btn.dataset.originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .8s linear infinite"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83"/></svg> Loading\u2026';
        btn.style.opacity = "0.65";
        btn.style.pointerEvents = "none";
      } else {
        btn.disabled = false;
        btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
        btn.style.opacity = "1";
        btn.style.pointerEvents = "";
      }
    }
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- SSE Push Notifications -->
  <script>
    (function () {
      var _sseSource = null;

      var SSE_EVENTS = {
        appointment_booked:    "success",
        appointment_requested: "success",
        appointment_confirmed: "success",
        appointment_cancelled: "error",
        reminder:              "success",
        notification:          "success",
      };

      function connectSSE(linkedID) {
        if (_sseSource) { _sseSource.close(); _sseSource = null; }
        var cfg = document.getElementById("svc-config");
        if (!cfg) return;
        var sseBase = cfg.dataset.sseUrl;
        if (!sseBase) return;

        var url = sseBase + "/sse/stream?userID=" + encodeURIComponent(linkedID);
        _sseSource = new EventSource(url);

        Object.keys(SSE_EVENTS).forEach(function (eventName) {
          _sseSource.addEventListener(eventName, function (e) {
            try {
              var data = JSON.parse(e.data);
              if (data.message) showToast(data.message, SSE_EVENTS[eventName]);
            } catch (_) {}
          });
        });

        // Auto-reconnect is handled natively by EventSource on error
        _sseSource.onerror = function () {};
      }

      fbAuth.onAuthStateChanged(function (u) {
        if (!u) {
          if (_sseSource) { _sseSource.close(); _sseSource = null; }
          return;
        }
        // Reuse the shared Firestore read from the navbar handler.
        var p = window._userDocPromise || fbDb.collection("users").doc(u.uid).get();
        p.then(function (snap) {
          if (!snap.exists) return;
          var linkedID = snap.data().linkedID;
          if (linkedID) connectSSE(linkedID);
        }).catch(function () {});
      });
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
