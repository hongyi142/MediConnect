{% extends "base.html" %}
{% block title %}Consultation - MediConnect{% endblock %}
{% block navbar %}{% endblock %}

{% block content %}
<div class="consult-layout">
    <div class="video-area">
        <div class="video-container">
            <div id="remote-video" class="remote-video"></div>
            <div id="local-video" class="local-video"></div>
            <div class="video-status" id="video-status">Connecting...</div>
        </div>
        <div class="controls-bar">
            <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><path d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/></svg></button>
            <button class="ctrl-btn" id="cam-btn" onclick="toggleCamera()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"/></svg></button>
            <button class="ctrl-btn ctrl-leave" onclick="leaveCall()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg></button>
        </div>
    </div>

    <div class="notes-panel">
        <div class="panel-card">
            <h3>Consultation Notes</h3>
            <textarea id="notes-area" placeholder="Type notes here..." rows="12"></textarea>
            <div class="notes-actions">
                <button class="btn-panel btn-save" onclick="saveNotes()">Save Notes</button>
                <button class="btn-panel btn-ai" onclick="summariseNotes()">Summarise</button>
            </div>
            <small class="note-hint">Notes auto-saved on Submit &amp; Prescribe.</small>
        </div>
    </div>

    <div class="info-panel">
        <div class="panel-card">
            <h3>Patient Info</h3>
            <div id="patient-info"></div>
        </div>
        <button class="btn-prescribe" onclick="goToPrescription()">Submit &amp; Prescribe</button>
    </div>
</div>

<!-- AI Summary Modal -->
<div class="modal-overlay" id="summary-modal" style="display:none">
    <div class="modal-card">
        <div class="modal-header"><h3>AI Summary</h3><button class="modal-close" onclick="closeSummary()">&times;</button></div>
        <div class="modal-body" id="summary-content"></div>
        <div class="modal-footer">
            <button class="btn-panel btn-save" onclick="useSummary()">Use This Summary</button>
            <button class="btn-panel" onclick="closeSummary()">Dismiss</button>
        </div>
    </div>
</div>

<style>
    body{margin:0;background:#0f172a}
    .consult-layout{display:grid;grid-template-columns:1fr 280px 220px;height:100vh}
    .video-area{display:flex;flex-direction:column}
    .video-container{flex:1;position:relative;background:#1e293b}
    .remote-video{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
    .remote-video video{width:100%;height:100%;object-fit:cover}
    .local-video{position:absolute;bottom:1rem;right:1rem;width:180px;height:120px;border-radius:8px;background:#334155;overflow:hidden;border:2px solid rgba(255,255,255,.2)}
    .local-video video{width:100%;height:100%;object-fit:cover}
    .video-status{position:absolute;top:1rem;left:1rem;background:rgba(0,0,0,.5);color:#fff;padding:.25rem .75rem;border-radius:999px;font-size:.75rem}
    .controls-bar{display:flex;justify-content:center;gap:1rem;padding:.75rem;background:#1e293b}
    .ctrl-btn{width:44px;height:44px;border-radius:50%;border:none;background:#334155;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .ctrl-btn:hover{background:#475569}.ctrl-btn.active{background:#ef4444}
    .ctrl-leave{background:#ef4444}.ctrl-leave:hover{background:#dc2626}
    .notes-panel,.info-panel{background:#1e293b;border-left:1px solid #334155;padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.75rem}
    .panel-card{background:#334155;border-radius:12px;padding:1rem}
    .panel-card h3{color:#fff;font-size:.875rem;font-weight:600;margin:0 0 .75rem}
    .panel-card textarea{width:100%;background:#1e293b;border:1px solid #475569;border-radius:8px;color:#e2e8f0;padding:.625rem;font-size:.8125rem;resize:vertical;box-sizing:border-box;font-family:inherit}
    .panel-card textarea:focus{outline:none;border-color:#0d9488}
    .notes-actions{display:flex;gap:.5rem;margin-top:.5rem}
    .btn-panel{padding:.375rem .75rem;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
    .btn-save{background:#0d9488;color:#fff}.btn-save:hover{background:#0f766e}
    .btn-ai{background:#334155;color:#0d9488;border:1px solid #0d9488}.btn-ai:hover{background:#0d9488;color:#fff}
    .note-hint{color:#64748b;font-size:.6875rem;display:block;margin-top:.375rem}
    #patient-info{color:#94a3b8;font-size:.8125rem}
    #patient-info .row{padding:.25rem 0;border-bottom:1px solid #475569}
    #patient-info .row:last-child{border:none}
    #patient-info .val{color:#e2e8f0;font-weight:500}
    .allergy-badge{display:inline-block;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:999px;padding:0 .375rem;font-size:.6875rem;margin:.125rem}
    .btn-prescribe{width:100%;padding:.75rem;background:#0d9488;color:#fff;border:none;border-radius:8px;font-weight:600;font-size:.875rem;cursor:pointer;transition:background .15s}
    .btn-prescribe:hover{background:#0f766e}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
    .modal-card{background:#1e293b;border-radius:12px;width:90%;max-width:500px;border:1px solid #334155}
    .modal-header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid #334155}
    .modal-header h3{color:#fff;margin:0;font-size:1rem}
    .modal-close{background:none;border:none;color:#94a3b8;font-size:1.25rem;cursor:pointer}
    .modal-body{padding:1.25rem;color:#e2e8f0;font-size:.875rem;max-height:300px;overflow-y:auto;white-space:pre-wrap}
    .modal-footer{padding:.75rem 1.25rem;border-top:1px solid #334155;display:flex;gap:.5rem;justify-content:flex-end}
    @media(max-width:900px){.consult-layout{grid-template-columns:1fr 240px}.info-panel{display:none}}
    @media(max-width:640px){.consult-layout{grid-template-columns:1fr}.notes-panel{display:none}}
</style>

<script>
    var room = null, localTracks = [], consultData = null, aiSummary = "";

    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await fbDb.collection("users").doc(u.uid).get();
        if (!snap.exists) { location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "doctor") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage(user);
    });

    function initPage(user) {
        var raw = sessionStorage.getItem("consultationData");
        if (!raw) { location.href = "/doctor/dashboard"; return; }
        consultData = JSON.parse(raw);

        loadPatientInfo();
        connectVideo(consultData.doctorToken, consultData.roomName);
    }

    async function loadPatientInfo() {
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var apptRes = await fetch(cfg.apptUrl + "/appointment/" + consultData.apptID, { headers: { "Authorization": "Bearer " + token } });
            var appt = await apptRes.json();
            var pRes = await fetch(cfg.patientUrl + "/patient/" + appt.patientID, { headers: { "Authorization": "Bearer " + token } });
            var p = await pRes.json();
            var allergies = (p.allergies||[]).map(function(a) { return '<span class="allergy-badge">' + a + '</span>'; }).join(" ") || "None";
            document.getElementById("patient-info").innerHTML =
                '<div class="row"><span>Name</span> <span class="val">' + (p.name||"") + '</span></div>' +
                '<div class="row"><span>NRIC</span> <span class="val">' + (p.NRIC||"") + '</span></div>' +
                '<div class="row"><span>Appt</span> <span class="val">' + consultData.apptID + '</span></div>' +
                '<div class="row"><span>Allergies</span></div><div style="margin:.25rem 0">' + allergies + '</div>';
        } catch(e) {}
    }

    async function connectVideo(token, roomName) {
        if (!token || !window.Twilio) { document.getElementById("video-status").textContent = "Video unavailable"; return; }
        try {
            room = await Twilio.Video.connect(token, { name: roomName, audio: true, video: { width: 640 } });
            document.getElementById("video-status").textContent = "Connected";
            room.localParticipant.tracks.forEach(function(pub) {
                if (pub.track) { localTracks.push(pub.track); document.getElementById("local-video").appendChild(pub.track.attach()); }
            });
            room.participants.forEach(handleP);
            room.on("participantConnected", handleP);
            room.on("participantDisconnected", function() { document.getElementById("remote-video").innerHTML = ""; document.getElementById("video-status").textContent = "Patient disconnected"; });
        } catch(e) { document.getElementById("video-status").textContent = "Connection failed"; }
    }

    function handleP(p) {
        p.tracks.forEach(function(pub) { if (pub.isSubscribed && pub.track) document.getElementById("remote-video").appendChild(pub.track.attach()); });
        p.on("trackSubscribed", function(t) { document.getElementById("remote-video").appendChild(t.attach()); });
    }

    function toggleMute() { localTracks.forEach(function(t) { if (t.kind==="audio") t.isEnabled?t.disable():t.enable(); }); document.getElementById("mute-btn").classList.toggle("active"); }
    function toggleCamera() { localTracks.forEach(function(t) { if (t.kind==="video") t.isEnabled?t.disable():t.enable(); }); document.getElementById("cam-btn").classList.toggle("active"); }
    function leaveCall() { if (room) room.disconnect(); localTracks.forEach(function(t) { t.stop(); }); location.href = "/doctor/dashboard"; }

    async function saveNotes() {
        var notes = document.getElementById("notes-area").value;
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            await fetch(cfg.consultationUrl + "/consultation/" + consultData.apptID + "/notes", {
                method: "PUT", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ notes: notes })
            });
            if (typeof showToast === "function") showToast("Notes saved!");
        } catch(e) {}
    }

    async function summariseNotes() {
        var notes = document.getElementById("notes-area").value.trim();
        if (!notes) { alert("Please enter notes first."); return; }
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.openaiUrl + "/openai/summarise-notes", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ notes: notes })
            });
            var data = await res.json();
            aiSummary = data.summary || "No summary generated.";
            document.getElementById("summary-content").textContent = aiSummary;
            document.getElementById("summary-modal").style.display = "flex";
        } catch(e) { alert("Summarisation failed."); }
    }

    function useSummary() { document.getElementById("notes-area").value += "\n\n--- AI Summary ---\n" + aiSummary; closeSummary(); }
    function closeSummary() { document.getElementById("summary-modal").style.display = "none"; }

    function goToPrescription() {
        saveNotes();
        sessionStorage.setItem("doctorNotes", document.getElementById("notes-area").value);
        if (room) room.disconnect();
        localTracks.forEach(function(t) { t.stop(); });
        location.href = "/doctor/prescription";
    }
</script>
{% endblock %}
