{% extends "base.html" %}
{% block title %}Inventory - MediConnect{% endblock %}

{% block content %}
<div class="inv-page">
    <div class="inv-container">
        <div class="page-header-row">
            <h1 class="page-title">Inventory Management</h1>
            <button class="btn btn-primary" onclick="openAddModal()">+ Add Medication</button>
        </div>

        <div class="stat-grid" id="stats"></div>

        <div class="table-wrap">
            <table class="data-table">
                <thead><tr><th>Medication</th><th>Description</th><th>Stock</th><th>Price</th><th>Actions</th></tr></thead>
                <tbody id="inv-body"><tr><td colspan="5" class="text-muted">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Restock Modal -->
<div class="modal-overlay" id="modal" style="display:none">
    <div class="modal-card">
        <div class="modal-header"><h3 id="modal-title">Add Medication</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="modal-submit">Save</button>
        </div>
        <div id="modal-error" class="alert-err" style="display:none"></div>
    </div>
</div>

<style>
    /* Page wrapper */
    .inv-page { padding-top: var(--navbar-height); background: var(--slate-50); min-height: 100vh; }
    .inv-container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Header row */
    .page-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .page-title { font-size: clamp(2rem, 3vw, 2.5rem); font-weight: 800; color: var(--slate-900); margin: 0; letter-spacing: -0.02em; font-family: var(--font-heading); }

    /* Stat grid */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: var(--radius-xl); padding: 1.5rem; text-align: center; box-shadow: var(--shadow-md); transition: transform var(--duration-fast), box-shadow var(--duration-fast); }
    .stat-box:hover { transform: translateY(-3px); box-shadow: var(--shadow-xl); }
    .stat-box .val { font-size: var(--text-2xl); font-weight: var(--weight-bold); color: var(--text); }
    .stat-box .lbl { font-size: var(--text-xs); color: var(--text-secondary); margin-top: 0.125rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: var(--weight-medium); }
    .val-warning { color: var(--warning); }
    .val-danger { color: var(--danger); }
    .out-text { color: var(--danger); font-weight: 700; }
    .stock-info { font-size: .8125rem; color: var(--text-secondary); margin: 0 0 1rem; }

    /* Table card */
    .table-wrap { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: var(--radius-2xl); overflow: hidden; box-shadow: var(--shadow-lg); padding: 1rem; }
    .data-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); font-family: var(--font); }
    .data-table th { text-align: left; padding: 1rem 1.25rem; background: rgba(248, 250, 252, 0.5); color: var(--slate-500); font-weight: 700; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid rgba(226, 232, 240, 0.8); }
    .data-table td { padding: 1rem 1.25rem; border-bottom: 1px solid rgba(226, 232, 240, 0.5); color: var(--slate-800); }
    .data-table tr:hover td { background: rgba(255,255,255,0.4); }
    .data-table tr:last-child td { border: none; }
    .data-table tr.low { background: rgba(254, 252, 232, 0.6); }
    .data-table tr.out { background: var(--danger-bg); }
    .warn-icon { color: var(--warning); font-weight: var(--weight-bold); margin-left: 0.25rem; }
    .med-cell { display: flex; align-items: center; gap: .625rem; }
    .med-thumb { width: 44px; height: 44px; border-radius: var(--radius-md); object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; background: var(--slate-100); }
    .med-thumb-fallback { width: 44px; height: 44px; border-radius: var(--radius-md); border: 1px dashed var(--border); color: var(--text-muted); font-size: .6875rem; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--slate-50); }
    .form-hint { margin: .375rem 0 0; color: var(--text-muted); font-size: var(--text-xs); }

    /* Buttons */
    .btn { padding: 0.5rem 1rem; border-radius: var(--radius-md); font-weight: 600; font-size: var(--text-sm); cursor: pointer; border: none; min-height: 44px; font-family: var(--font); transition: all .2s; display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(14, 165, 233, 0.4); }
    .btn-secondary { background: rgba(255,255,255,0.6); color: var(--slate-800); border: 1px solid rgba(226, 232, 240, 0.8); }
    .btn-secondary:hover { background: rgba(255,255,255,0.9); border-color: var(--primary); color: var(--primary); }
    .btn-sm { padding: 0.375rem 0.75rem; font-size: var(--text-xs); min-height: 32px; border-radius: var(--radius-sm); }
    .btn-amber { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-light); }
    .btn-amber:hover { background: var(--warning-light); }
    .action-btns { display: flex; gap: 0.375rem; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: var(--z-modal); padding: 1rem; }
    .modal-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.9); border-radius: var(--radius-2xl); width: 100%; max-width: 480px; box-shadow: var(--shadow-2xl); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem; border-bottom: 1px solid rgba(226, 232, 240, 0.6); }
    .modal-header h3 { margin: 0; font-size: var(--text-xl); font-weight: 700; color: var(--slate-900); letter-spacing:-0.01em; }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); padding: 0; transition: color var(--duration-fast); }
    .modal-close:hover { color: var(--slate-900); }
    .modal-body { padding: 2rem; }
    .modal-footer { padding: 1.25rem 2rem; border-top: 1px solid rgba(226, 232, 240, 0.6); display: flex; justify-content: flex-end; gap: 0.75rem; background: rgba(248, 250, 252, 0.5); border-radius: 0 0 var(--radius-2xl) var(--radius-2xl); }

    /* Form elements */
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; font-size: var(--text-sm); font-weight: var(--weight-medium); margin-bottom: 0.25rem; color: var(--text); }
    .form-group input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: var(--text-base); font-family: var(--font); box-sizing: border-box; min-height: 44px; color: var(--text); background: var(--surface); transition: border-color var(--duration-fast), box-shadow var(--duration-fast); }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.16); }

    /* Alert */
    .alert-err { background: var(--danger-bg); border: 1px solid var(--danger-light); color: var(--danger); padding: 0.5rem 1.5rem; font-size: var(--text-sm); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }

    /* Utility */
    .text-muted { color: var(--text-muted); text-align: center; padding: 1rem; }

    /* Responsive */
    @media (max-width: 768px) {
        .stat-grid { grid-template-columns: repeat(2, 1fr); }
        .page-header-row { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    }
</style>

<script>
    var allItems = [];

    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await (window._userDocPromise || fbDb.collection("users").doc(u.uid).get());
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "doctor") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        loadInventory();
    });

    async function loadInventory() {
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.invUrl + "/inventory", { headers: { "Authorization": "Bearer " + token } });
            var data = await res.json();
            allItems = data.data || data || [];
            renderStats();
            renderTable();
        } catch(e) { document.getElementById("inv-body").innerHTML = '<tr><td colspan="5" class="text-muted">Could not load inventory.</td></tr>'; }
    }

    function renderStats() {
        var total = allItems.length;
        var inStock = allItems.filter(function(i) { return (i.quantity||i.Quantity||0) > 0; }).length;
        var low = allItems.filter(function(i) { var q = i.quantity||i.Quantity||0; return q > 0 && q < 5; }).length;
        var out = allItems.filter(function(i) { return (i.quantity||i.Quantity||0) === 0; }).length;
        document.getElementById("stats").innerHTML =
            '<div class="stat-box"><div class="val">' + total + '</div><div class="lbl">Total SKUs</div></div>' +
            '<div class="stat-box"><div class="val">' + inStock + '</div><div class="lbl">In Stock</div></div>' +
            '<div class="stat-box"><div class="val val-warning">' + low + '</div><div class="lbl">Low Stock</div></div>' +
            '<div class="stat-box"><div class="val val-danger">' + out + '</div><div class="lbl">Out of Stock</div></div>';
    }

    function renderTable() {
        if (!allItems.length) { document.getElementById("inv-body").innerHTML = '<tr><td colspan="5" class="text-muted">No inventory items.</td></tr>'; return; }
        document.getElementById("inv-body").innerHTML = allItems.map(function(item) {
            var qty = item.quantity || item.Quantity || 0;
            var cls = qty === 0 ? "out" : qty < 5 ? "low" : "";
            var id = item.medicationID || item.id;
            var name = item.name || "";
            var imageUrl = item.imageUrl || item.photoUrl || "";
            var imageHtml = imageUrl
                ? '<img class="med-thumb" src="' + escapeAttr(imageUrl) + '" alt="' + escapeAttr(name || "Medication") + '">'
                : '<span class="med-thumb-fallback">No image</span>';
            var warn = qty < 5 && qty > 0 ? '<span class="warn-icon">!</span>' : qty === 0 ? '<span class="out-text"> OUT</span>' : '';
            var actions = '<div class="action-btns">';
            if (qty < 10) actions += '<button class="btn btn-amber btn-sm" onclick="openRestock(\'' + id + '\',' + qty + ',\'' + encodeURIComponent(name) + '\')">Restock</button>';
            actions += '<button class="btn btn-secondary btn-sm" onclick="openEditModal(\'' + id + '\')">Edit</button>';
            actions += '</div>';
            return '<tr class="' + cls + '"><td><div class="med-cell">' + imageHtml + '<div>' + escapeHtml(name) + '</div></div></td><td>' + escapeHtml(item.description || "") + '</td><td>' + qty + warn + '</td><td>$' + Number(item.price||0).toFixed(2) + '</td><td>' + actions + '</td></tr>';
        }).join("");
    }

    function openAddModal() {
        document.getElementById("modal-title").textContent = "Add Medication";
        document.getElementById("modal-body").innerHTML =
            '<div class="form-group"><label>Name *</label><input id="m-name"></div>' +
            '<div class="form-group"><label>Description</label><input id="m-desc"></div>' +
            '<div class="form-group"><label>Quantity *</label><input type="number" id="m-qty" min="0" value="0"></div>' +
            '<div class="form-group"><label>Price *</label><input type="number" id="m-price" min="0" step="0.01" value="0"></div>' +
            '<div class="form-group"><label>Medication Picture</label><input type="file" id="m-image" accept="image/png,image/jpeg,image/webp"><p class="form-hint">Optional. JPG, PNG or WEBP.</p></div>';
        document.getElementById("modal-error").style.display = "none";
        document.getElementById("modal-submit").textContent = "Save";
        document.getElementById("modal-submit").onclick = submitAdd;
        document.getElementById("modal").style.display = "flex";
    }

    function openRestock(id, currentQty, encodedName) {
        var name = decodeURIComponent(encodedName || "");
        document.getElementById("modal-title").textContent = "Restock: " + name;
        document.getElementById("modal-body").innerHTML =
            '<p class="stock-info">Current stock: ' + currentQty + '</p>' +
            '<div class="form-group"><label>Add Quantity</label><input type="number" id="m-restock-qty" min="1" value="10"></div>';
        document.getElementById("modal-error").style.display = "none";
        document.getElementById("modal-submit").textContent = "Save";
        document.getElementById("modal-submit").onclick = function() { submitRestock(id); };
        document.getElementById("modal").style.display = "flex";
    }

    function openEditModal(id) {
        var item = allItems.find(function(i) { return (i.medicationID || i.id) === id; }) || {};
        document.getElementById("modal-title").textContent = "Edit Medication";
        var currentThumb = item.imageUrl
            ? '<img src="' + escapeAttr(item.imageUrl) + '" style="width:56px;height:56px;object-fit:cover;border-radius:8px;margin-bottom:.5rem;display:block;">'
            : '';
        document.getElementById("modal-body").innerHTML =
            '<div class="form-group"><label>Name *</label><input id="e-name" value="' + escapeAttr(item.name || "") + '"></div>' +
            '<div class="form-group"><label>Description</label><input id="e-desc" value="' + escapeAttr(item.description || "") + '"></div>' +
            '<div class="form-group"><label>Price ($)</label><input type="number" id="e-price" min="0" step="0.01" value="' + Number(item.price || 0).toFixed(2) + '"></div>' +
            '<div class="form-group"><label>Photo</label>' + currentThumb +
            '<input type="file" id="e-photo" accept="image/png,image/jpeg,image/webp">' +
            '<p class="form-hint">Leave empty to keep the current photo. JPG, PNG or WEBP.</p></div>';
        document.getElementById("modal-error").style.display = "none";
        document.getElementById("modal-submit").textContent = "Save";
        document.getElementById("modal-submit").onclick = function() { submitEdit(id); };
        document.getElementById("modal").style.display = "flex";
    }

    function closeModal() {
        activePhotoMedicationID = null;
        document.getElementById("modal-submit").textContent = "Save";
        document.getElementById("modal-error").style.display = "none";
        document.getElementById("modal").style.display = "none";
    }

    function escapeHtml(value) {
        return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
        return escapeHtml(value);
    }

    async function submitAdd() {
        var cfg = document.getElementById("svc-config").dataset;
        var name = document.getElementById("m-name").value.trim();
        var errDiv = document.getElementById("modal-error");
        if (!name) { errDiv.textContent = "Name required."; errDiv.style.display = ""; return; }
        var imageFile = document.getElementById("m-image").files[0] || null;
        var formData = new FormData();
        formData.append("name", name);
        formData.append("description", document.getElementById("m-desc").value.trim());
        formData.append("quantity", String(parseInt(document.getElementById("m-qty").value) || 0));
        formData.append("price", String(parseFloat(document.getElementById("m-price").value) || 0));
        if (imageFile) formData.append("image", imageFile);
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.invUrl + "/inventory", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token },
                body: formData
            });
            if (!res.ok) {
                var err = await res.json().catch(function(){ return {}; });
                throw new Error(err.message || "Failed");
            }
            closeModal(); loadInventory();
            if (typeof showToast === "function") showToast("Medication added!");
        } catch(e) { errDiv.textContent = e.message || "Could not add medication."; errDiv.style.display = ""; }
    }

    async function submitRestock(id) {
        var cfg = document.getElementById("svc-config").dataset;
        var qty = parseInt(document.getElementById("m-restock-qty").value) || 0;
        if (qty < 1) return;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.invUrl + "/inventory/" + id, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ quantity: qty })
            });
            if (!res.ok) throw new Error("Failed");
            closeModal(); loadInventory();
            if (typeof showToast === "function") showToast("Restocked!");
        } catch(e) { document.getElementById("modal-error").textContent = "Restock failed."; document.getElementById("modal-error").style.display = ""; }
    }

    async function submitEdit(id) {
        var cfg = document.getElementById("svc-config").dataset;
        var errDiv = document.getElementById("modal-error");
        var name = document.getElementById("e-name").value.trim();
        if (!name) { errDiv.textContent = "Name is required."; errDiv.style.display = ""; return; }
        var formData = new FormData();
        formData.append("name", name);
        formData.append("description", document.getElementById("e-desc").value.trim());
        formData.append("price", String(parseFloat(document.getElementById("e-price").value) || 0));
        var photoFile = document.getElementById("e-photo").files[0] || null;
        if (photoFile) formData.append("image", photoFile);
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.invUrl + "/inventory/" + id, {
                method: "PUT",
                headers: { "Authorization": "Bearer " + token },
                body: formData
            });
            if (!res.ok) {
                var err = await res.json().catch(function(){ return {}; });
                throw new Error(err.message || "Failed");
            }
            closeModal();
            await loadInventory();
            if (typeof showToast === "function") showToast("Medication updated!");
        } catch(e) {
            errDiv.textContent = e.message || "Update failed.";
            errDiv.style.display = "";
        }
    }
</script>
{% endblock %}
