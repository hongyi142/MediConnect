{% extends "base.html" %}
{% block title %}Inventory - MediConnect{% endblock %}

{% block content %}
<div class="inv-page">
    <div class="inv-container">
        <div class="page-header-row">
            <h1 class="page-title">Inventory Management</h1>
            <button class="btn btn-primary" onclick="openAddModal()">+ Add Medication</button>
        </div>

        <div class="stat-grid" id="stats"></div>

        <div class="table-wrap">
            <table class="data-table">
                <thead><tr><th>Medication</th><th>Description</th><th>Stock</th><th>Price</th><th>Actions</th></tr></thead>
                <tbody id="inv-body"><tr><td colspan="5" class="text-muted">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add/Restock Modal -->
<div class="modal-overlay" id="modal" style="display:none">
    <div class="modal-card">
        <div class="modal-header"><h3 id="modal-title">Add Medication</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="modal-submit">Save</button>
        </div>
        <div id="modal-error" class="alert-err" style="display:none"></div>
    </div>
</div>

<style>
    /* Page wrapper */
    .inv-page { padding-top: var(--navbar-height); background: var(--bg); min-height: 100vh; }
    .inv-container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Header row */
    .page-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .page-title { font-size: var(--text-2xl); font-weight: 700; color: var(--text); margin: 0; letter-spacing: -0.02em; }

    /* Stat grid */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; text-align: center; box-shadow: var(--shadow-card); transition: transform var(--duration-fast), box-shadow var(--duration-fast); }
    .stat-box:hover { transform: translateY(-1px); box-shadow: var(--shadow-card-hover); }
    .stat-box .val { font-size: var(--text-2xl); font-weight: var(--weight-bold); color: var(--text); }
    .stat-box .lbl { font-size: var(--text-xs); color: var(--text-secondary); margin-top: 0.125rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: var(--weight-medium); }

    /* Table card */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-card); }
    .data-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); font-family: var(--font); }
    .data-table th { text-align: left; padding: 0.75rem 1rem; background: var(--slate-50); color: var(--text-secondary); font-weight: var(--weight-semibold); font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
    .data-table td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-light); color: var(--text); }
    .data-table tr:last-child td { border: none; }
    .data-table tr.low { background: var(--warning-bg); }
    .data-table tr.out { background: var(--danger-bg); }
    .warn-icon { color: var(--warning); font-weight: var(--weight-bold); margin-left: 0.25rem; }

    /* Buttons */
    .btn { padding: 0.5rem 1rem; border-radius: var(--radius-md); font-weight: var(--weight-semibold); font-size: var(--text-sm); cursor: pointer; border: none; min-height: 44px; font-family: var(--font); transition: background var(--duration-fast), box-shadow var(--duration-fast), transform var(--duration-fast); display: inline-flex; align-items: center; justify-content: center; }
    .btn-primary { background: var(--primary); color: var(--text-inverse); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { background: var(--surface); color: var(--primary); border: 1px solid var(--primary); }
    .btn-secondary:hover { background: var(--primary-subtle); }
    .btn-sm { padding: 0.25rem 0.625rem; font-size: var(--text-xs); min-height: 32px; }
    .btn-amber { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-light); }
    .btn-amber:hover { background: var(--warning-light); }
    .action-btns { display: flex; gap: 0.375rem; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: var(--z-modal); padding: 1rem; }
    .modal-card { background: var(--surface); border-radius: var(--radius-lg); width: 100%; max-width: 420px; box-shadow: var(--shadow-xl); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
    .modal-header h3 { margin: 0; font-size: var(--text-lg); font-weight: var(--weight-semibold); color: var(--text); }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); padding: 0; transition: color var(--duration-fast); }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 1.5rem; }
    .modal-footer { padding: 0.75rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 0.5rem; }

    /* Form elements */
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; font-size: var(--text-sm); font-weight: var(--weight-medium); margin-bottom: 0.25rem; color: var(--text); }
    .form-group input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: var(--text-base); font-family: var(--font); box-sizing: border-box; min-height: 44px; color: var(--text); background: var(--surface); transition: border-color var(--duration-fast), box-shadow var(--duration-fast); }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12); }

    /* Alert */
    .alert-err { background: var(--danger-bg); border: 1px solid var(--danger-light); color: var(--danger); padding: 0.5rem 1.5rem; font-size: var(--text-sm); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }

    /* Utility */
    .text-muted { color: var(--text-muted); text-align: center; padding: 1rem; }

    /* Responsive */
    @media (max-width: 768px) {
        .stat-grid { grid-template-columns: repeat(2, 1fr); }
        .page-header-row { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    }
</style>

<script>
    var allItems = [];

    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await fbDb.collection("users").doc(u.uid).get();
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "doctor") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        loadInventory();
    });

    async function loadInventory() {
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.invUrl + "/inventory", { headers: { "Authorization": "Bearer " + token } });
            var data = await res.json();
            allItems = data.data || data || [];
            renderStats();
            renderTable();
        } catch(e) { document.getElementById("inv-body").innerHTML = '<tr><td colspan="5" class="text-muted">Could not load inventory.</td></tr>'; }
    }

    function renderStats() {
        var total = allItems.length;
        var inStock = allItems.filter(function(i) { return (i.quantity||i.Quantity||0) > 0; }).length;
        var low = allItems.filter(function(i) { var q = i.quantity||i.Quantity||0; return q > 0 && q < 5; }).length;
        var out = allItems.filter(function(i) { return (i.quantity||i.Quantity||0) === 0; }).length;
        document.getElementById("stats").innerHTML =
            '<div class="stat-box"><div class="val">' + total + '</div><div class="lbl">Total SKUs</div></div>' +
            '<div class="stat-box"><div class="val">' + inStock + '</div><div class="lbl">In Stock</div></div>' +
            '<div class="stat-box"><div class="val" style="color:#b45309">' + low + '</div><div class="lbl">Low Stock</div></div>' +
            '<div class="stat-box"><div class="val" style="color:#ef4444">' + out + '</div><div class="lbl">Out of Stock</div></div>';
    }

    function renderTable() {
        if (!allItems.length) { document.getElementById("inv-body").innerHTML = '<tr><td colspan="5" class="text-muted">No inventory items.</td></tr>'; return; }
        document.getElementById("inv-body").innerHTML = allItems.map(function(item) {
            var qty = item.quantity || item.Quantity || 0;
            var cls = qty === 0 ? "out" : qty < 5 ? "low" : "";
            var id = item.medicationID || item.id;
            var warn = qty < 5 && qty > 0 ? '<span class="warn-icon">!</span>' : qty === 0 ? '<span style="color:#ef4444;font-weight:700"> OUT</span>' : '';
            var actions = '<div class="action-btns">';
            if (qty < 10) actions += '<button class="btn btn-amber btn-sm" onclick="openRestock(\'' + id + '\',' + qty + ',\'' + (item.name||"") + '\')">Restock</button>';
            actions += '</div>';
            return '<tr class="' + cls + '"><td>' + (item.name||"") + '</td><td>' + (item.description||"") + '</td><td>' + qty + warn + '</td><td>$' + Number(item.price||0).toFixed(2) + '</td><td>' + actions + '</td></tr>';
        }).join("");
    }

    function openAddModal() {
        document.getElementById("modal-title").textContent = "Add Medication";
        document.getElementById("modal-body").innerHTML =
            '<div class="form-group"><label>Name *</label><input id="m-name"></div>' +
            '<div class="form-group"><label>Description</label><input id="m-desc"></div>' +
            '<div class="form-group"><label>Quantity *</label><input type="number" id="m-qty" min="0" value="0"></div>' +
            '<div class="form-group"><label>Price *</label><input type="number" id="m-price" min="0" step="0.01" value="0"></div>';
        document.getElementById("modal-error").style.display = "none";
        document.getElementById("modal-submit").onclick = submitAdd;
        document.getElementById("modal").style.display = "flex";
    }

    function openRestock(id, currentQty, name) {
        document.getElementById("modal-title").textContent = "Restock: " + name;
        document.getElementById("modal-body").innerHTML =
            '<p style="font-size:.8125rem;color:#64748b;margin:0 0 1rem">Current stock: ' + currentQty + '</p>' +
            '<div class="form-group"><label>Add Quantity</label><input type="number" id="m-restock-qty" min="1" value="10"></div>';
        document.getElementById("modal-error").style.display = "none";
        document.getElementById("modal-submit").onclick = function() { submitRestock(id); };
        document.getElementById("modal").style.display = "flex";
    }

    function closeModal() { document.getElementById("modal").style.display = "none"; }

    async function submitAdd() {
        var cfg = document.getElementById("svc-config").dataset;
        var name = document.getElementById("m-name").value.trim();
        var errDiv = document.getElementById("modal-error");
        if (!name) { errDiv.textContent = "Name required."; errDiv.style.display = ""; return; }
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.invUrl + "/inventory", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({
                    name: name,
                    description: document.getElementById("m-desc").value.trim(),
                    quantity: parseInt(document.getElementById("m-qty").value) || 0,
                    price: parseFloat(document.getElementById("m-price").value) || 0
                })
            });
            if (!res.ok) throw new Error("Failed");
            closeModal(); loadInventory();
            if (typeof showToast === "function") showToast("Medication added!");
        } catch(e) { errDiv.textContent = "Could not add medication."; errDiv.style.display = ""; }
    }

    async function submitRestock(id) {
        var cfg = document.getElementById("svc-config").dataset;
        var qty = parseInt(document.getElementById("m-restock-qty").value) || 0;
        if (qty < 1) return;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.invUrl + "/inventory/" + id, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ quantity: qty })
            });
            if (!res.ok) throw new Error("Failed");
            closeModal(); loadInventory();
            if (typeof showToast === "function") showToast("Restocked!");
        } catch(e) { document.getElementById("modal-error").textContent = "Restock failed."; document.getElementById("modal-error").style.display = ""; }
    }
</script>
{% endblock %}
