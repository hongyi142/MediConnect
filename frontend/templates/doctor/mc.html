{% extends "base.html" %}
{% block title %}MC Issued - MediConnect{% endblock %}

{% block content %}
<div class="page-container">
    <div class="mc-card">
        <div class="mc-icon">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h1>Medical Certificate Issued</h1>

        <div class="mc-details" id="mc-details"></div>
        <div class="order-details" id="order-details"></div>

        <div id="mc-warning" class="alert alert-warning" style="display:none">MC generation may have failed. The order was still created successfully.</div>

        <div class="mc-actions">
            <button class="btn btn-primary" id="download-btn" onclick="downloadMC()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:.375rem"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                Download MC
            </button>
            <a href="/doctor/dashboard" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</div>

<style>
    .page-container{max-width:640px;margin:0 auto;padding:3rem 1.5rem;padding-top:var(--navbar-height)}
    .mc-card{background:rgba(255, 255, 255, 0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255, 255, 255, 0.9);border-radius:var(--radius-2xl);padding:3rem 2.5rem;text-align:center;box-shadow:var(--shadow-xl)}
    .mc-icon{margin-bottom:1.5rem}
    .mc-card h1{font-size:clamp(1.75rem, 3vw, 2rem);font-weight:800;color:var(--slate-900);margin:0 0 2rem;letter-spacing:-0.02em;font-family:var(--font-heading)}
    .mc-details,.order-details{text-align:left;background:rgba(255, 255, 255, 0.5);border:1px solid rgba(226, 232, 240, 0.6);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.25rem}
    .mc-details h3,.order-details h3{font-size:.875rem;font-weight:700;color:var(--slate-800);text-transform:uppercase;letter-spacing:.05em;margin:0 0 1rem;font-family:var(--font-heading)}
    .detail-row{display:flex;justify-content:space-between;padding:.375rem 0;font-size:.875rem}
    .detail-row .label{color:var(--text-secondary)}.detail-row .value{color:var(--slate-900);font-weight:600}
    .mc-actions{display:flex;gap:1rem;justify-content:center;margin-top:2rem}
    .btn{padding:.75rem 1.5rem;border-radius:var(--radius-md);font-weight:600;font-size:.9375rem;font-family:var(--font);cursor:pointer;border:none;min-height:44px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;text-decoration:none}
    .btn-primary{background:linear-gradient(135deg, var(--primary), var(--accent));color:#fff;box-shadow:0 4px 12px rgba(14, 165, 233, 0.3)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(14, 165, 233, 0.4)}
    .btn-secondary{background:rgba(255,255,255,0.6);color:var(--slate-800);border:1px solid rgba(226, 232, 240, 0.8)}
    .btn-secondary:hover{background:rgba(255,255,255,0.9);border-color:var(--primary);color:var(--primary)}
    .alert-warning{background:var(--warning-bg);border:1px solid var(--warning-light);color:var(--warning);padding:.75rem;border-radius:var(--radius-md);font-size:.875rem;text-align:left}
</style>

<script>
    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await (window._userDocPromise || fbDb.collection("users").doc(u.uid).get());
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "doctor") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage(user);
    });

    function initPage(user) {
        var raw = sessionStorage.getItem("completionData");
        if (!raw) { location.href = "/doctor/dashboard"; return; }
        var data = JSON.parse(raw);

        var mc = data.mcDetails || {};
        document.getElementById("mc-details").innerHTML =
            '<h3>Medical Certificate</h3>' +
            '<div class="detail-row"><span class="label">Patient</span><span class="value">' + (mc.patientName || "") + '</span></div>' +
            '<div class="detail-row"><span class="label">NRIC</span><span class="value">' + (mc.patientNRIC || "") + '</span></div>' +
            '<div class="detail-row"><span class="label">Doctor</span><span class="value">Dr. ' + user.name + '</span></div>' +
            '<div class="detail-row"><span class="label">Diagnosis</span><span class="value">' + (mc.diagnosis || "") + '</span></div>' +
            '<div class="detail-row"><span class="label">MC Period</span><span class="value">' + (mc.startDate||"") + ' to ' + (mc.endDate||"") + ' (' + (mc.days||"") + ' days)</span></div>' +
            '<div class="detail-row"><span class="label">Date Issued</span><span class="value">' + new Date().toLocaleDateString() + '</span></div>';

        document.getElementById("order-details").innerHTML =
            '<h3>Order</h3>' +
            '<div class="detail-row"><span class="label">Order ID</span><span class="value">' + (data.orderID || "N/A") + '</span></div>' +
            '<div class="detail-row"><span class="label">Total Amount</span><span class="value">$' + Number(data.totalAmount||0).toFixed(2) + '</span></div>';

        document.getElementById("download-btn").style.display = "none";
        if (!data.mcDownloadUrl) {
            document.getElementById("mc-warning").style.display = "";
        }

        window._mcUrl = data.mcDownloadUrl;
    }

    function downloadMC() {
        if (window._mcUrl) window.open(window._mcUrl, "_blank");
    }
</script>
{% endblock %}
