{% extends "base.html" %}
{% block title %}MC Issued - MediConnect{% endblock %}

{% block content %}
<div class="page-container">
    <div class="mc-card">
        <div class="mc-icon">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h1>Medical Certificate Issued</h1>

        <div class="mc-details" id="mc-details"></div>
        <div class="order-details" id="order-details"></div>

        <div id="mc-warning" class="alert alert-warning" style="display:none">MC generation may have failed. The order was still created successfully.</div>

        <div class="mc-actions">
            <button class="btn btn-primary" id="download-btn" onclick="downloadMC()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:.375rem"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                Download MC
            </button>
            <a href="/doctor/dashboard" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</div>

<style>
    .page-container{max-width:640px;margin:0 auto;padding:2rem 1.5rem}
    .mc-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .mc-icon{margin-bottom:1rem}
    .mc-card h1{font-size:1.5rem;font-weight:600;color:#1e293b;margin:0 0 1.5rem}
    .mc-details,.order-details{text-align:left;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:1rem;margin-bottom:1rem}
    .mc-details h3,.order-details h3{font-size:.875rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin:0 0 .5rem}
    .detail-row{display:flex;justify-content:space-between;padding:.25rem 0;font-size:.8125rem}
    .detail-row .label{color:#64748b}.detail-row .value{color:#1e293b;font-weight:500}
    .mc-actions{display:flex;gap:.75rem;justify-content:center;margin-top:1.5rem}
    .btn{padding:.75rem 1.5rem;border-radius:8px;font-weight:600;font-size:.875rem;cursor:pointer;border:none;min-height:44px;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;text-decoration:none}
    .btn-primary{background:#0d9488;color:#fff}.btn-primary:hover{background:#0f766e}
    .btn-secondary{background:#fff;color:#0d9488;border:1px solid #0d9488}
    .alert-warning{background:#fffbeb;border:1px solid #fde68a;color:#b45309;padding:.75rem;border-radius:8px;font-size:.875rem;text-align:left}
</style>

<script>
    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await fbDb.collection("users").doc(u.uid).get();
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "doctor") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage(user);
    });

    function initPage(user) {
        var raw = sessionStorage.getItem("completionData");
        if (!raw) { location.href = "/doctor/dashboard"; return; }
        var data = JSON.parse(raw);

        var mc = data.mcDetails || {};
        document.getElementById("mc-details").innerHTML =
            '<h3>Medical Certificate</h3>' +
            '<div class="detail-row"><span class="label">Patient</span><span class="value">' + (mc.patientName || "") + '</span></div>' +
            '<div class="detail-row"><span class="label">NRIC</span><span class="value">' + (mc.patientNRIC || "") + '</span></div>' +
            '<div class="detail-row"><span class="label">Doctor</span><span class="value">Dr. ' + user.name + '</span></div>' +
            '<div class="detail-row"><span class="label">Diagnosis</span><span class="value">' + (mc.diagnosis || "") + '</span></div>' +
            '<div class="detail-row"><span class="label">MC Period</span><span class="value">' + (mc.startDate||"") + ' to ' + (mc.endDate||"") + ' (' + (mc.days||"") + ' days)</span></div>' +
            '<div class="detail-row"><span class="label">Date Issued</span><span class="value">' + new Date().toLocaleDateString() + '</span></div>';

        document.getElementById("order-details").innerHTML =
            '<h3>Order</h3>' +
            '<div class="detail-row"><span class="label">Order ID</span><span class="value">' + (data.orderID || "N/A") + '</span></div>' +
            '<div class="detail-row"><span class="label">Total Amount</span><span class="value">$' + Number(data.totalAmount||0).toFixed(2) + '</span></div>';

        if (!data.mcDownloadUrl) {
            document.getElementById("mc-warning").style.display = "";
            document.getElementById("download-btn").style.display = "none";
        }

        window._mcUrl = data.mcDownloadUrl;
    }

    function downloadMC() {
        if (window._mcUrl) window.open(window._mcUrl, "_blank");
    }
</script>
{% endblock %}
