{% extends "base.html" %}
{% block title %}Prescription - MediConnect{% endblock %}

{% block content %}
<div class="page-wrap">
<div class="page-container">
    <div class="page-header">
        <h1>Prescribe Medications</h1>
        <p class="text-muted" id="context-info"></p>
    </div>
    <div class="two-col">
        <div class="col-left">
            <div class="card" id="med-list"><p class="text-muted">Loading medications...</p></div>
            <div class="running-total" id="running-total">Selected: 0 items | Total: $0.00</div>
        </div>
        <div class="col-right">
            <div class="card">
                <h2>Order Summary</h2>
                <div id="order-summary"><p class="text-muted text-sm">Select medications to see summary.</p></div>
                <div class="mc-section">
                    <div class="mc-toggle">
                        <label class="toggle-label"><input type="checkbox" id="mc-toggle" onchange="toggleMC()"> Issue Medical Certificate</label>
                    </div>
                    <div id="mc-form" style="display:none">
                        <div class="form-group"><label>Diagnosis *</label><input id="mc-diagnosis" required></div>
                        <div class="form-row">
                            <div class="form-group flex-1"><label>Start Date</label><input type="date" id="mc-start"></div>
                            <div class="form-group flex-1"><label>Days</label><input type="number" id="mc-days" min="1" value="2" onchange="updateMCEnd()"></div>
                        </div>
                        <div class="form-group"><label>End Date</label><input type="date" id="mc-end" readonly></div>
                    </div>
                </div>
                <div id="complete-error" class="alert alert-error" style="display:none"></div>
                <button class="btn btn-primary btn-block" id="complete-btn" onclick="completeConsultation()" disabled>Complete Consultation</button>
            </div>
        </div>
    </div>
</div>
</div>

<style>
    .page-wrap{padding-top:var(--navbar-height);min-height:100vh;background:var(--slate-50)}
    .page-container{max-width:1080px;margin:0 auto;padding:3rem 1.5rem}
    .page-header{margin-bottom:2rem}
    .page-header h1{font-size:clamp(2rem, 3vw, 2.5rem);font-weight:800;color:var(--slate-900);margin:0;letter-spacing:-0.02em;font-family:var(--font-heading)}
    .text-muted{color:var(--text-muted);font-size:var(--text-sm)}.text-sm{font-size:var(--text-sm)}
    .two-col{display:grid;grid-template-columns:58% 42%;gap:1.5rem;margin-top:1.5rem}
    .card{background:rgba(255, 255, 255, 0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255, 255, 255, 0.9);border-radius:var(--radius-2xl);padding:2rem;box-shadow:var(--shadow-xl)}
    .card h2{font-size:var(--text-xl);font-weight:700;margin:0 0 1.5rem;color:var(--slate-800);letter-spacing:-0.01em;font-family:var(--font-heading)}
    .med-card{background:rgba(255,255,255,0.5);border:1px solid rgba(226, 232, 240, 0.6);border-radius:var(--radius-lg);padding:1rem;margin-bottom:.75rem;display:flex;align-items:center;gap:1rem;transition:all var(--duration-fast)}
    .med-card:hover{background:rgba(255,255,255,0.8);box-shadow:var(--shadow-md)}
    .med-card.selected{border-left:4px solid var(--primary);background:var(--primary-subtle);border-color:var(--primary-light)}
    .med-thumb{width:52px;height:52px;border-radius:var(--radius-md);object-fit:cover;border:1px solid var(--border);background:var(--slate-100);flex-shrink:0}
    .med-thumb-fallback{width:52px;height:52px;border-radius:var(--radius-md);border:1px dashed var(--border);background:var(--slate-50);color:var(--text-muted);font-size:.6875rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .med-card input[type="checkbox"]{width:18px;height:18px;accent-color:var(--primary);cursor:pointer}
    .med-info{flex:1}
    .med-name{font-weight:600;font-size:var(--text-base);color:var(--text)}
    .med-price{font-size:var(--text-xs);color:var(--text-secondary)}
    .med-qty{width:60px;padding:.5rem;border:1px solid rgba(226, 232, 240, 0.8);border-radius:var(--radius-lg);text-align:center;font-size:var(--text-sm);min-height:36px;font-family:var(--font);background:rgba(255,255,255,0.8)}
    .med-qty:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(14, 165, 233, 0.16)}
    .med-qty:disabled{background:rgba(241, 245, 249, 0.5);color:var(--text-muted)}
    .med-instructions{width:100%;padding:.375rem .625rem;border:1px solid rgba(226, 232, 240, 0.8);border-radius:var(--radius-md);font-size:var(--text-xs);font-family:var(--font);background:rgba(255,255,255,0.8);resize:none;margin-top:.375rem;display:none}
    .med-instructions:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(14, 165, 233, 0.16)}
    .med-instructions.visible{display:block}
    .running-total{background:linear-gradient(135deg, rgba(14, 165, 233, 0.1), rgba(99, 102, 241, 0.1));border:1px solid rgba(14, 165, 233, 0.2);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-top:1.25rem;font-weight:700;color:var(--primary);font-size:var(--text-base);box-shadow:var(--shadow-sm)}
    .mc-section{border-top:1px solid rgba(226, 232, 240, 0.6);margin-top:1.5rem;padding-top:1.5rem}
    .toggle-label{display:flex;align-items:center;gap:.5rem;font-size:var(--text-base);font-weight:500;color:var(--text);cursor:pointer}
    .toggle-label input{accent-color:var(--primary);width:16px;height:16px}
    .form-group{margin-bottom:.75rem}
    .form-group label{display:block;font-size:var(--text-sm);font-weight:600;margin-bottom:.375rem;color:var(--slate-700)}
    .form-group input{width:100%;padding:.625rem .75rem;border:1px solid rgba(226, 232, 240, 0.8);border-radius:var(--radius-lg);font-size:var(--text-sm);box-sizing:border-box;min-height:44px;font-family:var(--font);transition:border-color var(--duration-fast),box-shadow var(--duration-fast);background:rgba(255,255,255,0.8)}
    .form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(14, 165, 233, 0.16)}
    .form-row{display:flex;gap:.75rem}
    .flex-1{flex:1}
    .btn{padding:.75rem 1.5rem;border-radius:var(--radius-md);font-weight:600;font-size:var(--text-base);cursor:pointer;border:none;min-height:48px;transition:all var(--duration-fast);font-family:var(--font)}
    .btn-primary{background:linear-gradient(135deg, var(--primary), var(--accent));color:#fff;box-shadow:0 4px 12px rgba(14, 165, 233, 0.3)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(14, 165, 233, 0.4)}
    .btn-primary:disabled{background:rgba(226, 232, 240, 0.8);color:var(--text-muted);cursor:not-allowed;box-shadow:none;transform:none}
    .btn-block{width:100%;margin-top:1.5rem}
    .alert-error{background:var(--danger-bg);border:1px solid var(--danger-light);color:var(--danger);padding:.75rem;border-radius:var(--radius-md);font-size:var(--text-base);margin-bottom:.75rem}
    .summary-item{display:flex;justify-content:space-between;font-size:var(--text-sm);padding:.5rem 0;border-bottom:1px solid rgba(226, 232, 240, 0.5);color:var(--slate-800)}
    .summary-med{display:flex;align-items:center;gap:.75rem;font-weight:500}
    .summary-med-thumb{width:32px;height:32px;border-radius:8px;object-fit:cover;border:1px solid var(--border);background:var(--slate-100);flex-shrink:0}
    .summary-med-thumb-fallback{width:32px;height:32px;border-radius:8px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:.625rem;color:var(--text-muted);background:var(--slate-50);flex-shrink:0}
    .summary-total{display:flex;justify-content:space-between;font-weight:800;font-size:var(--text-lg);padding:.75rem 0 0;color:var(--primary);border-top:2px solid rgba(226, 232, 240, 0.8);margin-top:.75rem}
    @media(max-width:768px){.two-col{grid-template-columns:1fr}}
</style>

<script>
    var CONSULTATION_FEE = 40;
    var medications = [], selected = {}, consultData = null, patientData = null, medById = {};

    function getMedPrice(m) {
        return Number(m.price || m.Price || m.unitPrice || m.UnitPrice || 0);
    }

    function resolveMedImageUrl(m) {
        return m.imageUrl || m.photoUrl || m.medicationImageUrl || "";
    }

    function escapeHtml(value) {
        return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await (window._userDocPromise || fbDb.collection("users").doc(u.uid).get());
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "doctor") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage(user);
    });

    async function initPage(user) {
        var raw = sessionStorage.getItem("consultationData");
        if (!raw) { location.href = "/doctor/dashboard"; return; }
        consultData = JSON.parse(raw);
        document.getElementById("context-info").textContent = "Appt: " + (consultData.apptID || "");

        // Set MC defaults
        var tmr = new Date(); tmr.setDate(tmr.getDate() + 1);
        document.getElementById("mc-start").value = tmr.toISOString().split("T")[0];
        updateMCEnd();

        // Load patient data
        var cfg = document.getElementById("svc-config").dataset;
        var token = await fbAuth.currentUser.getIdToken();
        try {
            var aRes = await fetch(cfg.apptUrl + "/appointment/" + consultData.apptID, { headers: { "Authorization": "Bearer " + token } });
            var appt = await aRes.json();
            var pRes = await fetch(cfg.patientUrl + "/patient/" + appt.patientID, { headers: { "Authorization": "Bearer " + token } });
            patientData = await pRes.json();
            patientData.patientID = appt.patientID;
        } catch(e) {}

        // Load medications
        try {
            var res = await fetch(cfg.completeConsultationUrl + "/available-medications", { headers: { "Authorization": "Bearer " + token } });
            var data = await res.json();
            medications = data.medications || data || [];
            renderMeds();
        } catch(e) { document.getElementById("med-list").innerHTML = '<p style="color:#b91c1c">Could not load medications.</p>'; }
    }

    function renderMeds() {
        medById = {};
        var html = medications.map(function(m, i) {
            var id = m.medicationID || m.id || i;
            medById[String(id)] = m;
            var price = getMedPrice(m);
            var qty = Number(m.quantity || m.Quantity || 0);
            var imageUrl = resolveMedImageUrl(m);
            var thumb = imageUrl
                ? '<img class="med-thumb" src="' + escapeHtml(imageUrl) + '" alt="' + escapeHtml(m.name || "Medication") + '">'
                : '<div class="med-thumb-fallback">No image</div>';
            return '<div class="med-card" id="mc-' + id + '">' +
                thumb +
                '<input type="checkbox" onchange="toggleMed(\'' + id + '\')">' +
                '<div class="med-info" style="flex:1">' +
                  '<div class="med-name">' + (m.name||"Unknown") + ' (' + id + ')</div>' +
                  '<div class="med-price">$' + Number(price).toFixed(2) + '/unit &middot; ' + qty + ' in stock</div>' +
                  '<textarea class="med-instructions" id="instr-' + id + '" rows="2" placeholder="Dosage instructions (e.g. Take 1 tablet twice daily after meals)" onchange="updateTotals()"></textarea>' +
                '</div>' +
                '<input type="number" class="med-qty" id="qty-' + id + '" min="1" max="' + qty + '" value="1" disabled onchange="updateTotals()">' +
                '</div>';
        }).join("");
        document.getElementById("med-list").innerHTML = html || '<p class="text-muted">No medications available.</p>';
    }

    function toggleMed(id) {
        var med = medById[String(id)] || {};
        var price = getMedPrice(med);
        var name = med.name || "Medication";
        var imageUrl = resolveMedImageUrl(med);
        var instrEl = document.getElementById("instr-" + id);
        if (selected[id]) {
            delete selected[id];
            document.getElementById("mc-" + id).classList.remove("selected");
            document.getElementById("qty-" + id).disabled = true;
            if (instrEl) instrEl.classList.remove("visible");
        } else {
            selected[id] = {
                medicationID: id,
                medicationName: name,
                unitPrice: price,
                qty: 1,
                instructions: "",
                imageUrl: imageUrl
            };
            document.getElementById("mc-" + id).classList.add("selected");
            document.getElementById("qty-" + id).disabled = false;
            if (instrEl) instrEl.classList.add("visible");
        }
        updateTotals();
    }

    function updateTotals() {
        var medicationTotal = 0, count = 0;
        Object.keys(selected).forEach(function(id) {
            var q = parseInt(document.getElementById("qty-" + id).value) || 1;
            selected[id].qty = q;
            var instrEl = document.getElementById("instr-" + id);
            selected[id].instructions = instrEl ? instrEl.value.trim() : "";
            medicationTotal += q * selected[id].unitPrice;
            count++;
        });
        var grandTotal = medicationTotal + CONSULTATION_FEE;
        document.getElementById("running-total").textContent =
            "Selected: " + count + " items | Medications: $" + medicationTotal.toFixed(2) +
            " | Consultation Fee: $" + CONSULTATION_FEE.toFixed(2) +
            " | Total: $" + grandTotal.toFixed(2);
        document.getElementById("complete-btn").disabled = count === 0;

        var summaryHtml = Object.keys(selected).map(function(id) {
            var m = selected[id];
            var thumb = m.imageUrl
                ? '<img class="summary-med-thumb" src="' + escapeHtml(m.imageUrl) + '" alt="' + escapeHtml(m.medicationName || "Medication") + '">'
                : '<span class="summary-med-thumb-fallback">N/A</span>';
            var instrNote = m.instructions ? '<div style="font-size:var(--text-xs);color:var(--text-muted);margin-top:.125rem">' + escapeHtml(m.instructions) + '</div>' : '';
            return '<div class="summary-item" style="flex-direction:column;align-items:flex-start;gap:.25rem"><div style="display:flex;justify-content:space-between;width:100%"><span class="summary-med">' + thumb + '<span>' + m.medicationName + ' (' + id + ') x' + m.qty + '</span></span><span>$' + (m.qty * m.unitPrice).toFixed(2) + '</span></div>' + instrNote + '</div>';
        }).join("");
        summaryHtml += '<div class="summary-item"><span>Medication Subtotal</span><span>$' + medicationTotal.toFixed(2) + '</span></div>';
        summaryHtml += '<div class="summary-item"><span>Consultation Fee</span><span>$' + CONSULTATION_FEE.toFixed(2) + '</span></div>';
        summaryHtml += '<div class="summary-total"><span>Total</span><span>$' + grandTotal.toFixed(2) + '</span></div>';
        document.getElementById("order-summary").innerHTML = count ? summaryHtml : '<p class="text-muted text-sm">Select medications to see summary.</p>';
    }

    function toggleMC() { document.getElementById("mc-form").style.display = document.getElementById("mc-toggle").checked ? "" : "none"; }
    function updateMCEnd() {
        var start = document.getElementById("mc-start").value;
        var days = parseInt(document.getElementById("mc-days").value) || 1;
        if (start) {
            var end = new Date(start);
            end.setDate(end.getDate() + days - 1);
            document.getElementById("mc-end").value = end.toISOString().split("T")[0];
        }
    }

    async function completeConsultation() {
        var btn = document.getElementById("complete-btn");
        var errDiv = document.getElementById("complete-error");
        errDiv.style.display = "none";
        btn.disabled = true; btn.textContent = "Processing...";

        var cfg = document.getElementById("svc-config").dataset;
        var meds = Object.values(selected);
        var issueMC = document.getElementById("mc-toggle").checked;

        var body = {
            apptID: consultData.apptID,
            patientID: patientData ? patientData.patientID : "",
            doctorID: window.currentUser.linkedID,
            notes: sessionStorage.getItem("doctorNotes") || "",
            medications: meds,
            issueMC: issueMC
        };

        if (issueMC) {
            body.mcDetails = {
                patientName: patientData ? patientData.name : "",
                patientNRIC: patientData ? patientData.NRIC : "",
                patientID: patientData ? patientData.patientID : "",
                doctorName: window.currentUser.name,
                diagnosis: document.getElementById("mc-diagnosis").value,
                startDate: document.getElementById("mc-start").value,
                endDate: document.getElementById("mc-end").value,
                days: parseInt(document.getElementById("mc-days").value) || 1
            };
        }

        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.completeConsultationUrl + "/complete-consultation", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify(body)
            });
            var data = await res.json();
            if (res.status === 409) { errDiv.textContent = "Stock issue - recheck inventory."; errDiv.style.display = ""; btn.disabled = false; btn.textContent = "Complete Consultation"; return; }
            if (!res.ok) throw new Error(data.error || data.message || "Failed");

            // Store completion data for payment/MC flow
            data.medications = meds;
            sessionStorage.setItem("completionData", JSON.stringify(data));
            sessionStorage.removeItem("doctorNotes");

            if (issueMC) { location.href = "/doctor/mc"; }
            else {
                if (typeof showToast === "function") showToast("Order #" + (data.orderID||"") + " created! Total: $" + Number(data.totalAmount||0).toFixed(2));
                setTimeout(function() { location.href = "/doctor/dashboard"; }, 4000);
            }
        } catch(e) {
            errDiv.textContent = e.message; errDiv.style.display = "";
            btn.disabled = false; btn.textContent = "Complete Consultation";
        }
    }
</script>
{% endblock %}
