{% extends "base.html" %}
{% block title %}Schedule - MediConnect{% endblock %}

{% block content %}
<div class="page-container">
    <h1 class="page-title">My Schedule</h1>

    <div class="card">
        <h2>Add Available Slot</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="slot-date">
            </div>
            <div class="form-group">
                <label>Start</label>
                <input type="time" id="slot-start" step="1800" value="09:00">
            </div>
            <div class="form-group">
                <label>End</label>
                <input type="time" id="slot-end" step="1800" value="09:30">
            </div>
            <div class="form-group action-cell">
                <button class="btn btn-primary" onclick="addSlot()">Add Slot</button>
            </div>
        </div>
        <div id="slot-error" class="alert" style="display:none"></div>
        <p class="helper">Slots define when patients can book with you. Appointment checks now use DoctorSchedule.</p>
    </div>

    <div class="card">
        <div class="cal-header">
            <button class="btn btn-secondary btn-sm" onclick="changeWeek(-1)">&larr; Previous</button>
            <h2 id="week-label"></h2>
            <button class="btn btn-secondary btn-sm" onclick="changeWeek(1)">Next &rarr;</button>
        </div>
        <div id="week-list"><p class="text-muted">Loading schedule...</p></div>
    </div>
</div>

<style>
    .page-container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; padding-top: var(--navbar-height); }
    .page-title { font-family: var(--font); font-size: var(--text-2xl); font-weight: 600; color: var(--text); margin: 0 0 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-card); margin-bottom: 1rem; }
    .card h2 { font-family: var(--font); font-size: var(--text-lg); font-weight: 600; color: var(--text); margin: 0 0 1rem; }
    .form-row { display: grid; grid-template-columns: 1.2fr 1fr 1fr auto; gap: .75rem; align-items: end; }
    .form-group label { display: block; font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: .25rem; }
    .form-group input { width: 100%; padding: .625rem; border: 1px solid var(--border); border-radius: var(--radius-md); min-height: 44px; box-sizing: border-box; }
    .action-cell { display: flex; align-items: end; }
    .btn { font-family: var(--font); padding: .5rem 1rem; border-radius: var(--radius-md); font-weight: 600; font-size: var(--text-sm); cursor: pointer; border: none; min-height: 44px; transition: all var(--duration-fast); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary { background: var(--surface); color: var(--primary); border: 1px solid var(--primary); min-height: 36px; }
    .btn-secondary:hover { background: var(--primary-subtle); }
    .btn-sm { padding: .375rem .75rem; min-height: 36px; }
    .helper { margin-top: .625rem; font-size: var(--text-xs); color: var(--text-muted); }
    .alert { margin-top: .625rem; border: 1px solid var(--danger-light); background: var(--danger-bg); color: var(--danger); padding: .625rem; border-radius: var(--radius-md); font-size: var(--text-sm); }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .slot-row { display: flex; justify-content: space-between; gap: .75rem; padding: .75rem; border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: .5rem; align-items: center; }
    .slot-date { font-weight: 600; color: var(--text); }
    .slot-time { color: var(--text-secondary); font-size: var(--text-sm); }
    .slot-id { color: var(--text-muted); font-size: var(--text-xs); }
    .text-muted { color: var(--text-muted); }
    @media(max-width: 768px) { .form-row { grid-template-columns: 1fr; } .slot-row { flex-direction: column; align-items: flex-start; } }
</style>

<script>
    var currentWeekStart = null;
    var allSlots = [];

    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await fbDb.collection("users").doc(u.uid).get();
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "doctor") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage();
    });

    function initPage() {
        var now = new Date();
        var tomorrow = new Date(now);
        tomorrow.setDate(now.getDate() + 1);
        document.getElementById("slot-date").min = tomorrow.toISOString().split("T")[0];
        document.getElementById("slot-date").value = tomorrow.toISOString().split("T")[0];

        currentWeekStart = new Date(now);
        currentWeekStart.setDate(now.getDate() - now.getDay() + 1);

        loadSlots();
    }

    async function loadSlots() {
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var from = new Date();
            from.setHours(0, 0, 0, 0);
            var to = new Date(from);
            to.setDate(to.getDate() + 45);
            var url = cfg.doctorUrl + "/doctor-schedule?doctorID=" + encodeURIComponent(window.currentUser.linkedID)
                + "&from=" + encodeURIComponent(from.toISOString())
                + "&to=" + encodeURIComponent(to.toISOString());
            var res = await fetch(url, { headers: { "Authorization": "Bearer " + token } });
            if (!res.ok) throw new Error();
            var data = await res.json();
            allSlots = data.slots || [];
        } catch (e) {
            allSlots = [];
        }
        renderWeek();
    }

    function changeWeek(dir) {
        currentWeekStart.setDate(currentWeekStart.getDate() + dir * 7);
        renderWeek();
    }

    function renderWeek() {
        var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        var end = new Date(currentWeekStart);
        end.setDate(end.getDate() + 6);
        document.getElementById("week-label").textContent =
            currentWeekStart.getDate() + " " + months[currentWeekStart.getMonth()] + " - " +
            end.getDate() + " " + months[end.getMonth()] + " " + end.getFullYear();

        var startMs = currentWeekStart.getTime();
        var endMs = end.getTime() + (24 * 60 * 60 * 1000);
        var weekSlots = allSlots.filter(function(s) {
            var t = new Date(s.slotStart).getTime();
            return t >= startMs && t < endMs;
        }).sort(function(a, b) { return new Date(a.slotStart) - new Date(b.slotStart); });

        if (!weekSlots.length) {
            document.getElementById("week-list").innerHTML = '<p class="text-muted">No slots this week.</p>';
            return;
        }

        document.getElementById("week-list").innerHTML = weekSlots.map(function(s) {
            var start = new Date(s.slotStart);
            var end = new Date(s.slotEnd);
            return '<div class="slot-row">' +
                '<div><div class="slot-date">' + start.toLocaleDateString("en-SG", { weekday: "long", day: "2-digit", month: "short", year: "numeric" }) + '</div>' +
                '<div class="slot-time">' + start.toLocaleTimeString("en-SG", { hour: "2-digit", minute: "2-digit" }) + ' - ' +
                end.toLocaleTimeString("en-SG", { hour: "2-digit", minute: "2-digit" }) + '</div></div>' +
                '<div class="slot-id">Slot ID: ' + (s.slotID || "-") + '</div>' +
                '</div>';
        }).join("");
    }

    async function addSlot() {
        var date = document.getElementById("slot-date").value;
        var start = document.getElementById("slot-start").value;
        var end = document.getElementById("slot-end").value;
        var err = document.getElementById("slot-error");
        err.style.display = "none";

        if (!date || !start || !end) {
            err.textContent = "Please provide date, start and end time.";
            err.style.display = "";
            return;
        }
        var startIso = date + "T" + start + ":00";
        var endIso = date + "T" + end + ":00";
        if (new Date(endIso) <= new Date(startIso)) {
            err.textContent = "End time must be after start time.";
            err.style.display = "";
            return;
        }

        try {
            var cfg = document.getElementById("svc-config").dataset;
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.doctorUrl + "/doctor-schedule", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({
                    doctorID: window.currentUser.linkedID,
                    slotStart: startIso,
                    slotEnd: endIso
                })
            });
            var data = await res.json();
            if (!res.ok) throw new Error(data.error || "Unable to add slot");
            if (typeof showToast === "function") showToast("Schedule slot added.");
            loadSlots();
        } catch (e) {
            err.textContent = e.message;
            err.style.display = "";
        }
    }
</script>
{% endblock %}
