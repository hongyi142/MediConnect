{% extends "base.html" %}
{% block title %}Staff Management - MediConnect{% endblock %}

{% block content %}
<div class="page-container">
    <h1 class="page-title">Staff Management</h1>
    <div class="tab-bar">
        <button class="tab active" onclick="switchTab('doctors',this)">Doctors</button>
        <button class="tab" onclick="switchTab('riders',this)">Riders</button>
    </div>

    <div id="doctors-tab">
        <div class="table-header"><h2>Doctors</h2><button class="btn btn-primary btn-sm" onclick="openModal('doctor')">+ Add Doctor</button></div>
        <div class="table-wrap"><table class="data-table"><thead><tr><th>Name</th><th>Specialisation</th><th>Email</th><th>Status</th></tr></thead><tbody id="doctors-body"><tr><td colspan="4" class="text-muted">Loading...</td></tr></tbody></table></div>
    </div>

    <div id="riders-tab" style="display:none">
        <div class="table-header"><h2>Riders</h2><button class="btn btn-primary btn-sm" onclick="openModal('rider')">+ Add Rider</button></div>
        <div class="table-wrap"><table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Status</th></tr></thead><tbody id="riders-body"><tr><td colspan="4" class="text-muted">Loading...</td></tr></tbody></table></div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none">
    <div class="modal-card">
        <div class="modal-header"><h3 id="modal-title">Add Staff</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="modal-submit" onclick="submitStaff()">Add</button>
        </div>
        <div id="modal-error" class="alert alert-error mt-2" style="display:none"></div>
    </div>
</div>

<style>
    .page-container{max-width:960px;margin:0 auto;padding:var(--navbar-height) 1.5rem 3rem}
    .page-title{font-size:clamp(2rem, 3vw, 2.5rem);font-weight:800;color:var(--slate-900);margin:1.5rem 0;letter-spacing:-0.02em;font-family:var(--font-heading)}
    .tab-bar{display:flex;border-bottom:2px solid var(--border);margin-bottom:1.5rem}
    .tab{padding:.625rem 1.25rem;background:none;border:none;font-family:var(--font);font-size:var(--text-base);font-weight:var(--weight-medium);color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all var(--duration-fast)}
    .tab:hover{color:var(--primary)}
    .tab.active{color:var(--primary);border-bottom-color:var(--primary)}
    .table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
    .table-header h2{font-size:var(--text-xl);font-weight:700;color:var(--slate-800);margin:0;letter-spacing:-0.01em;font-family:var(--font-heading)}
    .table-wrap{background:rgba(255, 255, 255, 0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255, 255, 255, 0.9);border-radius:var(--radius-2xl);overflow:hidden;box-shadow:var(--shadow-lg);padding:1rem}
    .data-table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
    .data-table th{text-align:left;padding:1rem 1.25rem;background:rgba(248, 250, 252, 0.5);color:var(--slate-500);font-weight:700;border-bottom:2px solid rgba(226, 232, 240, 0.8);text-transform:uppercase;letter-spacing:0.05em;font-size:var(--text-xs)}
    .data-table td{padding:1rem 1.25rem;border-bottom:1px solid rgba(226, 232, 240, 0.5);color:var(--slate-800)}
    .data-table tr:hover td{background:rgba(255,255,255,0.4)}
    .data-table tr:last-child td{border:none}
    .status-available{color:var(--success);font-weight:600;background:var(--success-bg);padding:0.25rem 0.5rem;border-radius:var(--radius-full);font-size:0.75rem}
    .status-busy{color:var(--warning);font-weight:600;background:var(--warning-bg);padding:0.25rem 0.5rem;border-radius:var(--radius-full);font-size:0.75rem}
    .status-offline{color:var(--text-muted);font-weight:600;background:var(--slate-100);padding:0.25rem 0.5rem;border-radius:var(--radius-full);font-size:0.75rem}
    .btn{padding:.625rem 1.25rem;border-radius:var(--radius-md);font-family:var(--font);font-weight:600;font-size:var(--text-sm);cursor:pointer;border:none;min-height:44px;transition:all var(--duration-fast);display:inline-flex;align-items:center;justify-content:center}
    .btn-primary{background:linear-gradient(135deg, var(--primary), var(--accent));color:#fff;box-shadow:0 4px 12px rgba(14, 165, 233, 0.3)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(14, 165, 233, 0.4)}
    .btn-secondary{background:rgba(255,255,255,0.6);color:var(--slate-800);border:1px solid rgba(226, 232, 240, 0.8)}
    .btn-secondary:hover{background:rgba(255,255,255,0.9);border-color:var(--primary);color:var(--primary)}
    .btn-sm{padding:.375rem .75rem;font-size:var(--text-xs);min-height:32px;border-radius:var(--radius-sm)}

    .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:var(--z-modal);padding:1rem}
    .modal-card{background:rgba(255, 255, 255, 0.85);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.9);border-radius:var(--radius-2xl);width:100%;max-width:480px;box-shadow:var(--shadow-2xl)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 2rem;border-bottom:1px solid rgba(226, 232, 240, 0.6)}
    .modal-header h3{margin:0;font-size:var(--text-xl);font-weight:700;color:var(--slate-900);letter-spacing:-0.01em}
    .modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-muted);padding:0;transition:color var(--duration-fast)}
    .modal-close:hover{color:var(--slate-900)}
    .modal-body{padding:2rem}
    .modal-footer{padding:1.25rem 2rem;border-top:1px solid rgba(226, 232, 240, 0.6);display:flex;justify-content:flex-end;gap:0.75rem;background:rgba(248, 250, 252, 0.5);border-radius:0 0 var(--radius-2xl) var(--radius-2xl)}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:var(--text-sm);font-weight:600;margin-bottom:.375rem;color:var(--slate-700)}
    .form-group input,.form-group select{width:100%;padding:.625rem .75rem;border:1px solid rgba(226, 232, 240, 0.8);border-radius:var(--radius-md);font-size:var(--text-sm);box-sizing:border-box;min-height:44px;font-family:var(--font);transition:border-color var(--duration-fast),box-shadow var(--duration-fast);background:rgba(255,255,255,0.8)}
    .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(14, 165, 233, 0.16)}
    .alert-error{background:var(--danger-bg);border:1px solid var(--danger-light);color:var(--danger);padding:.75rem;border-radius:var(--radius-md);font-size:var(--text-sm);margin:0 0 1rem}
    .text-muted{color:var(--text-muted);text-align:center;padding:1rem}.mt-2{margin-top:.5rem}
</style>

<script>
    var modalType = "doctor";

    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await (window._userDocPromise || fbDb.collection("users").doc(u.uid).get());
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "doctor") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage(user);
    });

    function initPage(user) {
        var cfg = document.getElementById("svc-config").dataset;
        loadDoctors(cfg);
        loadRiders(cfg);
    }

    async function loadDoctors(cfg) {
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.doctorUrl + "/doctor/list", { headers: { "Authorization": "Bearer " + token } });
            var data = await res.json();
            var docs = data.doctors || data || [];
            if (!docs.length) { document.getElementById("doctors-body").innerHTML = '<tr><td colspan="4" class="text-muted">No doctors found.</td></tr>'; return; }
            document.getElementById("doctors-body").innerHTML = docs.map(function(d) {
                return '<tr><td>' + (d.name||"") + '</td><td>' + (d.specialisation||"") + '</td><td>' + (d.email||"") + '</td><td><span class="status-' + (d.status||"available") + '">' + (d.status||"available") + '</span></td></tr>';
            }).join("");
        } catch(e) { document.getElementById("doctors-body").innerHTML = '<tr><td colspan="4" class="text-muted">Could not load doctors.</td></tr>'; }
    }

    async function loadRiders(cfg) {
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.riderUrl + "/rider/list", { headers: { "Authorization": "Bearer " + token } });
            var data = await res.json();
            var riders = data.data || data || [];
            if (!riders.length) { document.getElementById("riders-body").innerHTML = '<tr><td colspan="4" class="text-muted">No riders found.</td></tr>'; return; }
            document.getElementById("riders-body").innerHTML = riders.map(function(r) {
                return '<tr><td>' + (r.name||"") + '</td><td>' + (r.email||"") + '</td><td>' + (r.phone||"") + '</td><td><span class="status-' + (r.status||"available") + '">' + (r.status||"available") + '</span></td></tr>';
            }).join("");
        } catch(e) { document.getElementById("riders-body").innerHTML = '<tr><td colspan="4" class="text-muted">Could not load riders.</td></tr>'; }
    }

    function switchTab(tab, btn) {
        document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
        btn.classList.add("active");
        document.getElementById("doctors-tab").style.display = tab === "doctors" ? "" : "none";
        document.getElementById("riders-tab").style.display = tab === "riders" ? "" : "none";
    }

    function openModal(type) {
        modalType = type;
        document.getElementById("modal-title").textContent = type === "doctor" ? "Add Doctor" : "Add Rider";
        document.getElementById("modal-error").style.display = "none";
        if (type === "doctor") {
            document.getElementById("modal-body").innerHTML =
                '<div class="form-group"><label>Name *</label><input id="m-name"></div>' +
                '<div class="form-group"><label>Specialisation *</label><select id="m-spec"><option>General Practice</option><option>Dermatology</option><option>Cardiology</option><option>Orthopaedics</option><option>ENT</option><option>Ophthalmology</option><option>Gastroenterology</option><option>Neurology</option><option>Psychiatry</option><option>Gynaecology</option><option>Paediatrics</option></select></div>' +
                '<div class="form-group"><label>Email *</label><input type="email" id="m-email"></div>' +
                '<div class="form-group"><label>Phone *</label><input id="m-phone"></div>';
        } else {
            document.getElementById("modal-body").innerHTML =
                '<div class="form-group"><label>Name *</label><input id="m-name"></div>' +
                '<div class="form-group"><label>Email *</label><input type="email" id="m-email"></div>' +
                '<div class="form-group"><label>Phone *</label><input id="m-phone"></div>';
        }
        document.getElementById("modal").style.display = "flex";
    }

    function closeModal() { document.getElementById("modal").style.display = "none"; }

    async function submitStaff() {
        var cfg = document.getElementById("svc-config").dataset;
        var name = document.getElementById("m-name").value.trim();
        var phone = document.getElementById("m-phone").value.trim();
        var email = document.getElementById("m-email") ? document.getElementById("m-email").value.trim() : "";
        var errDiv = document.getElementById("modal-error");
        errDiv.style.display = "none";

        if (!name || !phone || !email) { errDiv.textContent = "All fields required."; errDiv.style.display = ""; return; }

        var btn = document.getElementById("modal-submit");
        btn.disabled = true; btn.textContent = "Adding...";
        var token = await fbAuth.currentUser.getIdToken();

        try {
            var responseData = null;
            if (modalType === "doctor") {
                var spec = document.getElementById("m-spec").value;
                var res = await fetch(cfg.doctorUrl + "/doctor", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                    body: JSON.stringify({ name: name, specialisation: spec, email: email, phone: phone })
                });
                responseData = await res.json();
                if (!res.ok) { throw new Error(responseData.error || "Failed"); }
                var firebaseUID = responseData.firebaseUID;
                if (firebaseUID) {
                    await fbDb.collection("users").doc(firebaseUID).set({
                        uid: firebaseUID, role: "doctor", name: name, email: email, linkedID: responseData.doctorID
                    });
                }
                loadDoctors(cfg);
            } else {
                var res = await fetch(cfg.riderUrl + "/rider/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                    body: JSON.stringify({ name: name, phone: phone, email: email })
                });
                responseData = await res.json();
                if (!res.ok) { throw new Error((responseData && responseData.error) || "Failed"); }
                var riderData = responseData.data || {};
                var firebaseUID = riderData.firebaseUID;
                if (firebaseUID) {
                    await fbDb.collection("users").doc(firebaseUID).set({
                        uid: firebaseUID, role: "rider", name: name, email: email, linkedID: riderData.riderID
                    });
                }
                loadRiders(cfg);
            }
            closeModal();
            if (typeof showToast === "function") {
                var payload = responseData.data || responseData;
                var pw = payload && payload.defaultPassword;
                var msg = modalType.charAt(0).toUpperCase() + modalType.slice(1) + " added successfully!";
                if (pw) msg += " Temporary password: " + pw;
                showToast(msg);
            }
        } catch(e) {
            errDiv.textContent = e.message;
            errDiv.style.display = "";
        }
        btn.disabled = false; btn.textContent = "Add";
    }
</script>
{% endblock %}
