{% extends "base.html" %}
{% block title %}My Appointments - MediConnect{% endblock %}

{% block content %}
<div class="page-container">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;flex-wrap:wrap">
        <h1 class="page-title" style="margin:0">My Appointments</h1>
        <a class="btn btn-primary" href="/patient/history">View Care History</a>
    </div>
    <div class="tab-bar">
        <button class="tab active" onclick="switchTab('upcoming',this)">Upcoming</button>
        <button class="tab" onclick="switchTab('past',this)">Past</button>
    </div>
    <div id="upcoming-tab"></div>
    <div id="past-tab" style="display:none"></div>
    <div id="loading" class="text-center text-muted py-4">Loading appointments...</div>
</div>

<style>
    .page-container {
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        padding-top: var(--navbar-height);
    }

    .page-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--text);
        margin: 0 0 1rem;
    }

    .tab-bar {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--border);
        margin-bottom: 1.5rem;
    }

    .tab {
        padding: .625rem 1.25rem;
        background: none;
        border: none;
        font-size: .875rem;
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all .15s;
    }

    .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
    }

    .appt-card {
        background: var(--surface, #fff);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
        margin-bottom: .75rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: var(--shadow-card);
    }

    .appt-left {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex: 1;
    }

    .date-block {
        width: 52px;
        height: 52px;
        border-radius: var(--radius-sm, 6px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: .75rem;
        font-weight: 600;
    }

    .date-block .day {
        font-size: 1.125rem;
    }

    .date-block.confirmed {
        background: var(--success-bg);
        color: var(--success);
        border: 1px solid var(--success-light);
    }

    .date-block.pending {
        background: var(--warning-bg);
        color: var(--warning);
        border: 1px solid var(--warning-light);
    }

    .date-block.cancelled {
        background: var(--danger-bg);
        color: var(--danger);
        border: 1px solid var(--danger-light);
    }

    .appt-details .time {
        font-weight: 600;
        color: var(--text);
        font-size: .9375rem;
    }

    .appt-details .meta {
        font-size: .8125rem;
        color: var(--text-secondary);
        margin-top: .125rem;
    }

    .status-badge {
        display: inline-block;
        padding: .125rem .5rem;
        border-radius: var(--radius-full, 999px);
        font-size: .6875rem;
        font-weight: 500;
        text-transform: capitalize;
    }

    .status-confirmed {
        background: var(--success-bg);
        color: var(--success);
    }

    .status-pending {
        background: var(--warning-bg);
        color: var(--warning);
    }

    .status-cancelled {
        background: var(--danger-bg);
        color: var(--danger);
    }

    .btn {
        padding: .5rem 1rem;
        border-radius: var(--radius-md, 10px);
        font-weight: 600;
        font-size: .8125rem;
        cursor: pointer;
        border: none;
        min-height: 36px;
        transition: all .15s;
    }

    .btn-primary {
        background: var(--primary);
        color: #fff;
    }

    .btn-primary:hover {
        background: var(--primary-hover);
    }

    .btn-disabled {
        background: var(--slate-200);
        color: var(--text-muted);
        cursor: not-allowed;
    }

    .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
    }

    .alt-inline {
        margin-top: .375rem;
        display: flex;
        flex-wrap: wrap;
        gap: .375rem;
    }

    .alt-chip {
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: var(--radius-full, 999px);
        font-size: .6875rem;
        padding: .2rem .5rem;
        cursor: pointer;
    }

    .alt-chip:hover {
        border-color: var(--primary);
        color: var(--primary);
    }

    .text-center { text-align: center; }
    .text-muted { color: var(--text-secondary); }
    .py-4 { padding: 2rem 0; }
</style>

<script>
    var allAppts = [];

    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await fbDb.collection("users").doc(u.uid).get();
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "patient") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage(user);
    });

    async function initPage(user) {
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.apptUrl + "/appointment/patient/" + user.linkedID, { headers: { "Authorization": "Bearer " + token } });
            if (!res.ok) throw new Error();
            var data = await res.json();
            allAppts = data.appointments || data || [];
        } catch(e) { allAppts = []; }
        document.getElementById("loading").style.display = "none";
        renderTabs();
    }

    function renderTabs() {
        var now = new Date();
        var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        var upcoming = allAppts.filter(function(a) { return new Date(a.slotStart || a.dateTime) >= now && a.status !== "cancelled"; })
            .sort(function(a,b) { return new Date(a.slotStart || a.dateTime) - new Date(b.slotStart || b.dateTime); });
        var past = allAppts.filter(function(a) { return new Date(a.slotStart || a.dateTime) < now || a.status === "cancelled"; })
            .sort(function(a,b) { return new Date(b.slotStart || b.dateTime) - new Date(a.slotStart || a.dateTime); });

        document.getElementById("upcoming-tab").innerHTML = upcoming.length ? upcoming.map(function(a) { return renderCard(a, months, true); }).join("") : '<div class="empty-state">No upcoming appointments.</div>';
        document.getElementById("past-tab").innerHTML = past.length ? past.map(function(a) { return renderCard(a, months, false); }).join("") : '<div class="empty-state">No past appointments.</div>';
    }

    function renderCard(a, months, showActions) {
        var d = new Date(a.slotStart || a.dateTime);
        var id = a.appointmentID || a.id;
        var action = "";
        if (showActions && a.status === "confirmed") {
            action = '<button class="btn btn-primary" onclick="joinAppt(\'' + id + '\')">Join</button>';
        } else if (showActions && a.status === "pending") {
            action = '<button class="btn btn-disabled" disabled>Awaiting Doctor</button>';
        }
        var reason = "";
        if (a.status === "cancelled" && a.cancellationReason) {
            reason = '<div class="meta">Reason: ' + a.cancellationReason + '</div>';
        }
        var altHtml = renderAlternativesInline(a);
        return '<div class="appt-card"><div class="appt-left"><div class="date-block ' + a.status + '"><span class="day">' + d.getDate() + '</span><span>' + months[d.getMonth()] + '</span></div>' +
            '<div class="appt-details"><div class="time">' + d.toLocaleTimeString("en-SG", { hour: "2-digit", minute: "2-digit" }) + '</div>' +
            '<div class="meta"><span class="status-badge status-' + a.status + '">' + a.status + '</span></div>' + reason + altHtml + '</div></div>' + action + '</div>';
    }

    function renderAlternativesInline(appt) {
        var alts = appt.alternativeOptions || {};
        var chips = [];
        (alts.sameSlotDoctors || []).slice(0, 3).forEach(function(d) {
            chips.push('<button class="alt-chip" onclick="rebookWithDoctor(\'' + (d.doctorID || "") + '\', \'' + (appt.specialisation || "") + '\')">Try ' + (d.name || d.doctorID) + ' (' + d.doctorID + ')' + '</button>');
        });
        (alts.otherTimeslots || []).slice(0, 3).forEach(function(s) {
            chips.push('<button class="alt-chip" onclick="rebookWithSlot(\'' + (s.doctorID || "") + '\', \'' + (s.slotStart || "") + '\', \'' + (appt.specialisation || "") + '\')">Try ' + fmtTime(s.slotStart) + '</button>');
        });
        if (!chips.length) return "";
        return '<div class="alt-inline">' + chips.join("") + '</div>';
    }

    function fmtTime(iso) {
        if (!iso) return "another slot";
        var d = new Date(iso);
        return d.toLocaleDateString("en-SG", { day: "2-digit", month: "short" }) + " " + d.toLocaleTimeString("en-SG", { hour: "2-digit", minute: "2-digit" });
    }

    function rebookWithDoctor(doctorID, specialisation) {
        var draft = { doctorPreference: "preferred", doctorID: doctorID, specialisation: specialisation };
        sessionStorage.setItem("bookDraft", JSON.stringify(draft));
        location.href = "/patient/book";
    }

    function rebookWithSlot(doctorID, slotStart, specialisation) {
        var dt = new Date(slotStart);
        var hh = dt.getHours().toString().padStart(2, "0");
        var mm = dt.getMinutes().toString().padStart(2, "0");
        var localDate = dt.getFullYear() + "-" + (dt.getMonth() + 1).toString().padStart(2, "0") + "-" + dt.getDate().toString().padStart(2, "0");
        var draft = {
            doctorPreference: doctorID ? "preferred" : "any",
            doctorID: doctorID || "",
            specialisation: specialisation,
            date: localDate,
            time: hh + ":" + mm
        };
        sessionStorage.setItem("bookDraft", JSON.stringify(draft));
        location.href = "/patient/book";
    }

    function switchTab(tab, btn) {
        document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
        btn.classList.add("active");
        document.getElementById("upcoming-tab").style.display = tab === "upcoming" ? "" : "none";
        document.getElementById("past-tab").style.display = tab === "past" ? "" : "none";
    }

    function joinAppt(id) {
        sessionStorage.setItem("apptID", id);
        location.href = "/patient/join";
    }
</script>
{% endblock %}
