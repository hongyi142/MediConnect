{% extends "base.html" %}
{% block title %}My Appointments - MediConnect{% endblock %}

{% block content %}
<div class="page-wrap">
<div class="page-container">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;flex-wrap:wrap">
        <h1 class="page-title" style="margin:0">My Appointments</h1>
        <a class="btn btn-primary" href="/patient/history">View Care History</a>
    </div>
    <div class="tab-bar">
        <button class="tab active" onclick="switchTab('upcoming',this)">Upcoming</button>
        <button class="tab" onclick="switchTab('past',this)">Past</button>
    </div>
    <div id="upcoming-tab"></div>
    <div id="past-tab" style="display:none"></div>
    <div id="loading" class="text-center text-muted py-4">Loading appointments...</div>
</div>
</div>

<style>
    .page-wrap { padding-top: var(--navbar-height); min-height: 100vh; background: var(--slate-50); }
    .page-container {
        max-width: 720px;
        margin: 0 auto;
        padding: 3rem 1.5rem;
    }

    .page-title {
        font-size: clamp(2rem, 3vw, 2.5rem);
        font-weight: 800;
        color: var(--slate-900);
        margin: 0 0 1rem;
        letter-spacing: -0.02em;
        font-family: var(--font-heading);
    }

    .tab-bar {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--border);
        margin-bottom: 1.5rem;
    }

    .tab {
        padding: .625rem 1.25rem;
        background: none;
        border: none;
        font-size: .875rem;
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all .15s;
    }

    .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
    }

    .appt-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: var(--radius-2xl);
        padding: 1.5rem;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: var(--shadow-md);
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .appt-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-xl); }

    .appt-left {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex: 1;
    }

    .date-block {
        width: 52px;
        height: 52px;
        border-radius: var(--radius-sm, 6px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: .75rem;
        font-weight: 600;
    }

    .date-block .day {
        font-size: 1.125rem;
    }

    .date-block.confirmed {
        background: var(--primary-subtle);
        color: var(--primary);
        border: 1px solid var(--primary-light);
    }

    .date-block.pending {
        background: var(--warning-bg);
        color: var(--warning);
        border: 1px solid var(--warning-light);
    }

    .date-block.cancelled {
        background: var(--danger-bg);
        color: var(--danger);
        border: 1px solid var(--danger-light);
    }

    .appt-details .time {
        font-weight: 600;
        color: var(--text);
        font-size: .9375rem;
    }

    .appt-details .meta {
        font-size: .8125rem;
        color: var(--text-secondary);
        margin-top: .125rem;
    }

    .status-badge {
        display: inline-block;
        padding: .125rem .5rem;
        border-radius: var(--radius-full, 999px);
        font-size: .6875rem;
        font-weight: 500;
        text-transform: capitalize;
    }

    .status-confirmed {
        background: var(--primary-subtle);
        color: var(--primary);
    }

    .status-pending {
        background: var(--warning-bg);
        color: var(--warning);
    }

    .status-cancelled {
        background: var(--danger-bg);
        color: var(--danger);
    }

    .btn {
        padding: .5rem 1rem;
        border-radius: var(--radius-md, 10px);
        font-weight: 600;
        font-size: .8125rem;
        cursor: pointer;
        border: none;
        min-height: 36px;
        transition: all .15s;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: #fff; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(14, 165, 233, 0.4);
    }

    .btn-disabled {
        background: var(--slate-200);
        color: var(--text-muted);
        cursor: not-allowed;
    }

    .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
    }

    .alt-inline {
        margin-top: .375rem;
        display: flex;
        flex-wrap: wrap;
        gap: .375rem;
    }

    .alt-chip {
        border: 1px solid rgba(226, 232, 240, 0.8);
        background: rgba(255, 255, 255, 0.6);
        border-radius: var(--radius-full, 999px);
        font-size: .75rem;
        padding: .3rem .75rem;
        cursor: pointer;
        transition: all 0.2s;
    }

    .alt-chip:hover {
        border-color: var(--primary);
        color: var(--primary);
        background: rgba(255, 255, 255, 0.9);
    }

    .text-center { text-align: center; }
    .text-muted { color: var(--text-secondary); }
    .py-4 { padding: 2rem 0; }

    .prescription-panel { margin-top: .75rem; background: rgba(241,245,249,0.7); border-radius: var(--radius-md); padding: .875rem; display: none; }
    .prescription-panel.open { display: block; }
    .rx-title { font-size: var(--text-xs); font-weight: 700; color: var(--slate-700); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
    .rx-item { display: flex; align-items: center; gap: .625rem; padding: .5rem 0; border-bottom: 1px solid rgba(226,232,240,0.5); font-size: var(--text-xs); color: var(--text); }
    .rx-item:last-child { border: none; }
    .rx-img { width: 48px; height: 48px; border-radius: var(--radius-md); object-fit: cover; flex-shrink: 0; border: 1px solid rgba(226,232,240,0.7); background: var(--slate-100); }
    .rx-img-placeholder { width: 48px; height: 48px; border-radius: var(--radius-md); flex-shrink: 0; border: 1px solid rgba(226,232,240,0.7); background: var(--slate-100); display: flex; align-items: center; justify-content: center; color: var(--text-muted); }
    .rx-body { flex: 1; min-width: 0; }
    .rx-price { flex-shrink: 0; font-weight: 600; }
    .rx-instr { font-size: var(--text-xs); color: var(--text-muted); font-style: italic; margin-top: .1rem; }
    .btn-rx { background: rgba(255,255,255,0.7); border: 1px solid rgba(226,232,240,0.8); border-radius: var(--radius-md); padding: .25rem .6rem; font-size: var(--text-xs); font-weight: 600; cursor: pointer; color: var(--text); transition: all .15s; }
    .btn-rx:hover { border-color: var(--primary); color: var(--primary); }
</style>

<script>
    var allAppts = [];

    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await (window._userDocPromise || fbDb.collection("users").doc(u.uid).get());
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "patient") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage(user);
    });

    async function initPage(user) {
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.apptUrl + "/appointment/patient/" + user.linkedID, { headers: { "Authorization": "Bearer " + token } });
            if (!res.ok) throw new Error();
            var data = await res.json();
            allAppts = data.appointments || data || [];
        } catch(e) { allAppts = []; }
        document.getElementById("loading").style.display = "none";
        renderTabs();
    }

    function renderTabs() {
        var now = new Date();
        var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        var upcoming = allAppts.filter(function(a) { return new Date(a.slotStart || a.dateTime) >= now && a.status !== "cancelled"; })
            .sort(function(a,b) { return new Date(a.slotStart || a.dateTime) - new Date(b.slotStart || b.dateTime); });
        var past = allAppts.filter(function(a) { return new Date(a.slotStart || a.dateTime) < now || a.status === "cancelled"; })
            .sort(function(a,b) { return new Date(b.slotStart || b.dateTime) - new Date(a.slotStart || a.dateTime); });

        document.getElementById("upcoming-tab").innerHTML = upcoming.length ? upcoming.map(function(a) { return renderCard(a, months, true); }).join("") : '<div class="empty-state">No upcoming appointments.</div>';
        document.getElementById("past-tab").innerHTML = past.length ? past.map(function(a) { return renderCard(a, months, false); }).join("") : '<div class="empty-state">No past appointments.</div>';
    }

    function renderCard(a, months, showActions) {
        var d = new Date(a.slotStart || a.dateTime);
        var id = a.appointmentID || a.id;
        var action = "";
        if (showActions && a.status === "confirmed") {
            action = '<button class="btn btn-primary" onclick="joinAppt(\'' + id + '\')">Join</button>';
        } else if (showActions && a.status === "pending") {
            action = '<button class="btn btn-disabled" disabled>Awaiting Doctor</button>';
        }
        var reason = "";
        if (a.status === "cancelled" && a.cancellationReason) {
            reason = '<div class="meta">Reason: ' + a.cancellationReason + '</div>';
        }
        var altHtml = renderAlternativesInline(a);
        // Show prescription button for completed past appointments
        var rxBtn = "";
        var rxPanel = "";
        if (!showActions && a.status !== "cancelled") {
            rxBtn = '<button class="btn-rx" onclick="togglePrescription(\'' + id + '\')">Prescription</button>';
            rxPanel = '<div class="prescription-panel" id="rx-' + id + '"><p class="text-muted" style="font-size:var(--text-xs)">Loading...</p></div>';
        }
        return '<div class="appt-card" style="flex-direction:column;align-items:stretch">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;gap:.75rem">' +
              '<div class="appt-left"><div class="date-block ' + a.status + '"><span class="day">' + d.getDate() + '</span><span>' + months[d.getMonth()] + '</span></div>' +
              '<div class="appt-details"><div class="time">' + d.toLocaleTimeString("en-SG", { hour: "2-digit", minute: "2-digit" }) + '</div>' +
              '<div class="meta"><span class="status-badge status-' + a.status + '">' + a.status + '</span></div>' + reason + altHtml + '</div></div>' +
              '<div style="display:flex;gap:.5rem;flex-shrink:0">' + rxBtn + action + '</div>' +
            '</div>' + rxPanel + '</div>';
    }

    function renderAlternativesInline(appt) {
        var alts = appt.alternativeOptions || {};
        var chips = [];
        (alts.sameSlotDoctors || []).slice(0, 3).forEach(function(d) {
            chips.push('<button class="alt-chip" onclick="rebookWithDoctor(\'' + (d.doctorID || "") + '\', \'' + (appt.specialisation || "") + '\')">Try ' + (d.name || d.doctorID) + ' (' + d.doctorID + ')' + '</button>');
        });
        (alts.otherTimeslots || []).slice(0, 3).forEach(function(s) {
            chips.push('<button class="alt-chip" onclick="rebookWithSlot(\'' + (s.doctorID || "") + '\', \'' + (s.slotStart || "") + '\', \'' + (appt.specialisation || "") + '\')">Try ' + fmtTime(s.slotStart) + '</button>');
        });
        if (!chips.length) return "";
        return '<div class="alt-inline">' + chips.join("") + '</div>';
    }

    function fmtTime(iso) {
        if (!iso) return "another slot";
        var d = new Date(iso);
        return d.toLocaleDateString("en-SG", { day: "2-digit", month: "short" }) + " " + d.toLocaleTimeString("en-SG", { hour: "2-digit", minute: "2-digit" });
    }

    function rebookWithDoctor(doctorID, specialisation) {
        var draft = { doctorPreference: "preferred", doctorID: doctorID, specialisation: specialisation };
        sessionStorage.setItem("bookDraft", JSON.stringify(draft));
        location.href = "/patient/book";
    }

    function rebookWithSlot(doctorID, slotStart, specialisation) {
        var dt = new Date(slotStart);
        var hh = dt.getHours().toString().padStart(2, "0");
        var mm = dt.getMinutes().toString().padStart(2, "0");
        var localDate = dt.getFullYear() + "-" + (dt.getMonth() + 1).toString().padStart(2, "0") + "-" + dt.getDate().toString().padStart(2, "0");
        var draft = {
            doctorPreference: doctorID ? "preferred" : "any",
            doctorID: doctorID || "",
            specialisation: specialisation,
            date: localDate,
            time: hh + ":" + mm
        };
        sessionStorage.setItem("bookDraft", JSON.stringify(draft));
        location.href = "/patient/book";
    }

    function switchTab(tab, btn) {
        document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
        btn.classList.add("active");
        document.getElementById("upcoming-tab").style.display = tab === "upcoming" ? "" : "none";
        document.getElementById("past-tab").style.display = tab === "past" ? "" : "none";
    }

    function joinAppt(id) {
        sessionStorage.setItem("apptID", id);
        location.href = "/patient/join";
    }

    function toOrderPatientId(raw) {
        var text = String(raw || "").trim();
        if (/^\d+$/.test(text)) return text;
        var crc = 0 ^ (-1);
        for (var i = 0; i < text.length; i++) {
            var c = text.charCodeAt(i);
            crc = crc ^ c;
            for (var j = 0; j < 8; j++) {
                var mask = -(crc & 1);
                crc = (crc >>> 1) ^ (0xEDB88320 & mask);
            }
        }
        var val = ((crc ^ (-1)) >>> 0) % 900000000 + 100000000;
        return String(val);
    }

    async function fetchOrderItems(cfg, patientId, apptId) {
        if (!patientId || !cfg.orderUrl) return [];
        var candidates = [String(patientId)];
        var hashed = toOrderPatientId(patientId);
        if (hashed !== String(patientId)) candidates.push(hashed);
        for (var i = 0; i < candidates.length; i++) {
            try {
                var ordersRes = await fetch(cfg.orderUrl + "/GetOrdersByPatient?PatientId=" + encodeURIComponent(candidates[i]));
                if (!ordersRes.ok) continue;
                var orders = await ordersRes.json();
                if (!Array.isArray(orders)) continue;
                var matched = orders.find(function(o) { return String(o.ApptId || "") === String(apptId); });
                if (!matched) continue;
                var itemsRes = await fetch(cfg.orderUrl + "/GetItemsByOrder?OrderId=" + encodeURIComponent(matched.Id));
                if (!itemsRes.ok) continue;
                var items = await itemsRes.json();
                if (Array.isArray(items) && items.length) return items;
            } catch (_) {}
        }
        return [];
    }

    var _rxLoaded = {};
    async function togglePrescription(apptId) {
        var panel = document.getElementById("rx-" + apptId);
        if (!panel) return;
        panel.classList.toggle("open");
        if (!panel.classList.contains("open")) return;
        if (_rxLoaded[apptId]) return;
        _rxLoaded[apptId] = true;

        var cfg = document.getElementById("svc-config").dataset;
        var token = await fbAuth.currentUser.getIdToken();
        var html = "";

        // Step 1: Fetch consultation — provides MC key AND stored medication list (with names + instructions)
        var consultMeds = [];
        try {
            var consultRes = await fetch(cfg.consultationUrl + "/consultation/" + encodeURIComponent(apptId), {
                headers: { "Authorization": "Bearer " + token }
            });
            if (consultRes.ok) {
                var cData = await consultRes.json();
                var consult = cData.consultation || cData;
                consultMeds = consult.medications || [];
                if (consult.mcIssued && consult.mcKey) {
                    var mcKey = consult.mcKey;
                    html += '<div style="margin-bottom:.625rem">' +
                        '<button class="btn-rx" onclick="downloadMC(\'' + mcKey.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\')">' +
                        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="margin-right:4px;vertical-align:-1px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>' +
                        'Download MC</button></div>';
                }
            }
        } catch (_) {}

        // Step 2: Render medications — prefer consultation record (has names + instructions),
        //         fall back to order service + inventory lookup for older records.
        if (consultMeds.length) {
            // Fetch images from inventory in parallel
            var medWithImages = await Promise.all(consultMeds.map(async function(med) {
                var imageUrl = "";
                var id = med.medicationID || "";
                if (id) {
                    try {
                        var invRes = await fetch(cfg.invUrl + "/inventory/" + encodeURIComponent(id) + "?includeImageUrl=true", {
                            headers: { "Authorization": "Bearer " + token }
                        });
                        if (invRes.ok) {
                            var invData = await invRes.json();
                            imageUrl = (invData.data && invData.data.imageUrl) || "";
                        }
                    } catch (_) {}
                }
                return Object.assign({}, med, { imageUrl: imageUrl });
            }));
            html += '<div class="rx-title">Prescribed Medications</div>';
            medWithImages.forEach(function(med) {
                var name = med.medicationName || med.name || "Unknown Medication";
                var id = med.medicationID || "";
                var qty = Number(med.qty || med.Quantity || 1);
                var price = Number(med.unitPrice || med.UnitPrice || 0);
                var instructions = med.instructions || "";
                var displayName = id ? (name + ' (' + id + ')') : name;
                var imgHtml = med.imageUrl
                    ? '<img class="rx-img" src="' + med.imageUrl + '" alt="' + name + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
                      '<div class="rx-img-placeholder" style="display:none"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9l4-4 4 4 4-6 4 6"/></svg></div>'
                    : '<div class="rx-img-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9l4-4 4 4 4-6 4 6"/></svg></div>';
                html += '<div class="rx-item">' + imgHtml +
                    '<div class="rx-body"><strong>' + displayName + '</strong> &times;' + qty +
                    (instructions ? '<div class="rx-instr">' + instructions + '</div>' : '') +
                    '</div><span class="rx-price">$' + (qty * price).toFixed(2) + '</span></div>';
            });
        } else {
            var patientId = window.currentUser && window.currentUser.linkedID;
            var items = await fetchOrderItems(cfg, patientId, apptId);
            if (items.length) {
                // Enrich with inventory names + images in parallel (order items only store IDs)
                var enriched = await Promise.all(items.map(async function(item) {
                    var medId = item.MedicationId || item.medicationId || item.medicationID || "";
                    var name = item.MedicationName || item.medicationName || "";
                    var imageUrl = "";
                    if (medId) {
                        try {
                            var invRes = await fetch(cfg.invUrl + "/inventory/" + encodeURIComponent(medId) + "?includeImageUrl=true", {
                                headers: { "Authorization": "Bearer " + token }
                            });
                            if (invRes.ok) {
                                var invData = await invRes.json();
                                name = (invData.data && invData.data.name) || name;
                                imageUrl = (invData.data && invData.data.imageUrl) || "";
                            }
                        } catch (_) {}
                    }
                    return {
                        medId: medId,
                        name: name,
                        imageUrl: imageUrl,
                        qty: Number(item.Quantity || item.qty || 1),
                        price: Number(item.UnitPrice || item.unitPrice || 0),
                        instructions: item.instructions || item.Instructions || ""
                    };
                }));
                html += '<div class="rx-title">Prescribed Medications</div>';
                enriched.forEach(function(med) {
                    var displayName = med.medId ? ((med.name || med.medId) + ' (' + med.medId + ')') : (med.name || "—");
                    var imgHtml = med.imageUrl
                        ? '<img class="rx-img" src="' + med.imageUrl + '" alt="' + (med.name || "") + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
                          '<div class="rx-img-placeholder" style="display:none"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9l4-4 4 4 4-6 4 6"/></svg></div>'
                        : '<div class="rx-img-placeholder"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9l4-4 4 4 4-6 4 6"/></svg></div>';
                    html += '<div class="rx-item">' + imgHtml +
                        '<div class="rx-body"><strong>' + displayName + '</strong> &times;' + med.qty +
                        (med.instructions ? '<div class="rx-instr">' + med.instructions + '</div>' : '') +
                        '</div><span class="rx-price">$' + (med.qty * med.price).toFixed(2) + '</span></div>';
                });
            } else {
                html += '<p class="text-muted rx-instr">No medications prescribed for this visit.</p>';
            }
        }

        panel.innerHTML = html;
    }

    async function downloadMC(mcKey) {
        var cfg = document.getElementById("svc-config").dataset;
        var token = await fbAuth.currentUser.getIdToken();
        try {
            var res = await fetch(cfg.mcUrl + "/mc/" + encodeURIComponent(mcKey), {
                headers: { "Authorization": "Bearer " + token }
            });
            if (!res.ok) throw new Error();
            var data = await res.json();
            if (data.downloadUrl) window.open(data.downloadUrl, "_blank");
        } catch(_) {
            showToast("Failed to download MC. Please try again.", "error");
        }
    }
</script>
{% endblock %}
