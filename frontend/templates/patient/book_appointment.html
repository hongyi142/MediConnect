{% extends "base.html" %}
{% block title %}Book Appointment - MediConnect{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="page-container">
        <h1 class="page-title">Book Appointment</h1>
        <div id="ai-banner" class="ai-banner" style="display:none"></div>
        <div class="two-col">
            <div class="col-left">
                <div class="card">
                    <h2 class="card-heading">Appointment Details</h2>
                    <div class="form-group">
                        <label class="form-label">Specialisation</label>
                        <select id="spec-select" class="form-control">
                            <option value="">No Preference</option>
                            <option>General Practice</option><option>Dermatology</option><option>Cardiology</option>
                            <option>Orthopaedics</option><option>ENT</option><option>Ophthalmology</option>
                            <option>Gastroenterology</option><option>Neurology</option><option>Psychiatry</option>
                            <option>Gynaecology</option><option>Paediatrics</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label class="form-label">Date *</label>
                            <input type="date" id="appt-date" class="form-control" required>
                        </div>
                        <div class="form-group flex-1">
                            <label class="form-label">Time *</label>
                            <select id="appt-time" class="form-control" required>
                                <option value="">Select time</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Reason for Visit *</label>
                        <textarea id="appt-reason" class="form-control" maxlength="300" rows="3" required placeholder="Briefly describe your concern"></textarea>
                    </div>
                    <div id="book-error" class="alert alert-error" style="display:none"></div>
                    <button class="btn btn-primary btn-block" id="book-btn" onclick="bookAppt()">Book Appointment</button>
                </div>
            </div>
            <div class="col-right">
                <div class="card" id="patient-card">
                    <h2 class="card-heading">Your Profile</h2>
                    <div id="profile-info"><p class="text-muted">Loading...</p></div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Page layout */
    .page-wrapper {
        padding-top: var(--navbar-height);
    }
    .page-container {
        max-width: 960px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
    }
    .page-title {
        font-size: var(--text-2xl);
        font-weight: var(--weight-semibold);
        color: var(--text);
        margin: 0 0 1rem;
    }

    /* Two-column grid */
    .two-col {
        display: grid;
        grid-template-columns: 55% 45%;
        gap: 1.5rem;
    }

    /* Card */
    .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        box-shadow: var(--shadow-card);
    }
    .card-heading {
        font-size: var(--text-md);
        font-weight: var(--weight-semibold);
        margin: 0 0 1rem;
        color: var(--text);
    }

    /* Form elements */
    .form-group {
        margin-bottom: 1rem;
    }
    .form-label {
        display: block;
        font-size: var(--text-base);
        font-weight: var(--weight-medium);
        margin-bottom: 0.375rem;
        color: var(--text);
    }
    .form-control {
        width: 100%;
        padding: 0.625rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        font-size: var(--text-base);
        box-sizing: border-box;
        min-height: 44px;
        font-family: inherit;
        background: var(--surface);
        color: var(--text);
        transition: border-color var(--duration-fast), box-shadow var(--duration-fast);
    }
    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }
    textarea.form-control {
        resize: vertical;
    }
    .form-row {
        display: flex;
        gap: 1rem;
    }
    .flex-1 {
        flex: 1;
    }

    /* Buttons */
    .btn {
        padding: 0.625rem 1.25rem;
        border-radius: var(--radius-md);
        font-weight: var(--weight-semibold);
        font-size: var(--text-base);
        cursor: pointer;
        border: none;
        min-height: 44px;
        transition: background var(--duration-fast), box-shadow var(--duration-fast);
    }
    .btn-primary {
        background: var(--primary);
        color: var(--text-inverse);
    }
    .btn-primary:hover {
        background: var(--primary-hover);
    }
    .btn-block {
        width: 100%;
    }

    /* Alert */
    .alert-error {
        background: var(--danger-bg);
        border: 1px solid var(--danger-light);
        color: var(--danger);
        padding: 0.75rem;
        border-radius: var(--radius-md);
        font-size: var(--text-base);
    }

    /* AI recommendation banner */
    .ai-banner {
        background: var(--primary-subtle);
        border: 1px solid var(--primary-light);
        color: var(--primary);
        padding: 0.75rem 1rem;
        border-radius: var(--radius-md);
        margin-bottom: 1rem;
        font-size: var(--text-base);
        font-weight: var(--weight-medium);
    }

    /* Badges */
    .allergy-badge {
        display: inline-block;
        background: var(--danger-bg);
        border: 1px solid var(--danger-light);
        color: var(--danger);
        border-radius: var(--radius-full);
        padding: 0.125rem 0.5rem;
        font-size: var(--text-xs);
        margin: 0.125rem;
    }
    .history-badge {
        display: inline-block;
        background: var(--primary-subtle);
        border: 1px solid var(--primary-light);
        color: var(--primary);
        border-radius: var(--radius-full);
        padding: 0.125rem 0.5rem;
        font-size: var(--text-xs);
        margin: 0.125rem;
    }

    /* Profile fields */
    .profile-field {
        margin-bottom: 0.75rem;
    }
    .profile-field .label {
        font-size: var(--text-xs);
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .profile-field .value {
        font-size: var(--text-base);
        color: var(--text);
        font-weight: var(--weight-medium);
    }

    /* Utilities */
    .text-muted {
        color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
        .two-col {
            grid-template-columns: 1fr;
        }
        .form-row {
            flex-direction: column;
            gap: 0.5rem;
        }
    }
</style>

<script>
    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await fbDb.collection("users").doc(u.uid).get();
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "patient") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage(user);
    });

    function initPage(user) {
        var cfg = document.getElementById("svc-config").dataset;

        // Time slots 09:00-17:00
        var sel = document.getElementById("appt-time");
        for (var h = 9; h < 17; h++) {
            for (var m = 0; m < 60; m += 30) {
                var t = h.toString().padStart(2,"0") + ":" + m.toString().padStart(2,"0");
                var opt = document.createElement("option"); opt.value = t; opt.textContent = t;
                sel.appendChild(opt);
            }
        }

        // Min date = tomorrow
        var tmr = new Date(); tmr.setDate(tmr.getDate() + 1);
        document.getElementById("appt-date").min = tmr.toISOString().split("T")[0];

        // Check AI recommendation
        var sr = sessionStorage.getItem("symptomResult");
        if (sr) {
            try {
                var result = JSON.parse(sr);
                if (result.specialisation) {
                    document.getElementById("spec-select").value = result.specialisation;
                    var banner = document.getElementById("ai-banner");
                    banner.textContent = "AI recommends: " + result.specialisation;
                    banner.style.display = "";
                }
            } catch(e) {}
            sessionStorage.removeItem("symptomResult");
        }

        // Load patient info
        loadProfile(cfg, user);
    }

    async function loadProfile(cfg, user) {
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.patientUrl + "/patient/" + user.linkedID, { headers: { "Authorization": "Bearer " + token } });
            if (!res.ok) throw new Error();
            var p = await res.json();
            var allergies = (p.allergies || []).map(function(a) { return '<span class="allergy-badge">' + a + '</span>'; }).join(" ") || "None";
            var history = (p.pastHistory || []).map(function(h) { return '<span class="history-badge">' + h + '</span>'; }).join(" ") || "None";
            document.getElementById("profile-info").innerHTML =
                '<div class="profile-field"><div class="label">Name</div><div class="value">' + (p.name || user.name) + '</div></div>' +
                '<div class="profile-field"><div class="label">Allergies</div><div>' + allergies + '</div></div>' +
                '<div class="profile-field"><div class="label">Medical History</div><div>' + history + '</div></div>';
        } catch(e) {
            document.getElementById("profile-info").innerHTML = '<p class="text-muted">Could not load profile.</p>';
        }
    }

    async function bookAppt() {
        var date = document.getElementById("appt-date").value;
        var time = document.getElementById("appt-time").value;
        var reason = document.getElementById("appt-reason").value.trim();
        var spec = document.getElementById("spec-select").value;
        var errDiv = document.getElementById("book-error");
        errDiv.style.display = "none";

        if (!date || !time || !reason) { errDiv.textContent = "Please fill all required fields."; errDiv.style.display = ""; return; }

        var btn = document.getElementById("book-btn");
        btn.disabled = true; btn.textContent = "Booking...";
        var cfg = document.getElementById("svc-config").dataset;

        try {
            var token = await fbAuth.currentUser.getIdToken();
            var body = { patientID: window.currentUser.linkedID, dateTime: date + "T" + time + ":00" };
            if (spec) body.specialisation = spec;

            var res = await fetch(cfg.bookAppointmentUrl + "/book-appointment", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify(body)
            });
            var data = await res.json();
            if (!res.ok) throw new Error(data.error || data.message || "Booking failed");

            if (typeof showToast === "function") showToast("Appointment booked successfully!");
            setTimeout(function() { location.href = "/patient/appointments"; }, 2000);
        } catch(e) {
            errDiv.textContent = e.message;
            errDiv.style.display = "";
            btn.disabled = false; btn.textContent = "Book Appointment";
        }
    }
</script>
{% endblock %}
