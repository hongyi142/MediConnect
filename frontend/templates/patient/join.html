{% extends "base.html" %}
{% block title %}Join Consultation - MediConnect{% endblock %}

{% block content %}
<div class="page-container">
    <div class="join-card">
        <div class="join-card-header">
            <div class="join-card-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="23 7 16 12 23 17 23 7"/>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                </svg>
            </div>
            <div>
                <h1>Join Consultation</h1>
                <p class="join-subtitle">Review your details and check your devices before joining</p>
            </div>
        </div>

        <div id="appt-info" class="info-section"></div>
        <div id="patient-info" class="info-section"></div>

        <div class="media-check">
            <h3>Camera &amp; Microphone Check</h3>
            <div class="media-preview">
                <video id="preview-video" autoplay muted playsinline></video>
                <div class="media-status">
                    <div id="cam-status" class="status-item">
                        <span class="dot grey"></span>
                        <span>Camera</span>
                    </div>
                    <div id="mic-status" class="status-item">
                        <span class="dot grey"></span>
                        <span>Microphone</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="join-error" class="alert alert-error" style="display:none"></div>
        <button class="btn btn-primary btn-block" id="join-btn" onclick="startConsultation()">Join Consultation</button>
    </div>
</div>

<style>
    .page-container {
        max-width: 640px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        padding-top: var(--navbar-height);
    }

    /* Card */
    .join-card {
        background: var(--surface, #fff);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 2rem;
        box-shadow: var(--shadow-card);
    }

    /* Header */
    .join-card-header {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 1.5rem;
    }
    .join-card-icon {
        width: 44px;
        height: 44px;
        border-radius: var(--radius-md);
        background: var(--primary-light, #DBEAFE);
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .join-card h1 {
        font-size: 1.375rem;
        font-weight: 700;
        color: var(--text);
        margin: 0;
        line-height: 1.3;
    }
    .join-subtitle {
        font-size: var(--text-sm);
        color: var(--text-secondary);
        margin: 0.25rem 0 0;
    }

    /* Info sections */
    .info-section {
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 1rem 1.25rem;
        margin-bottom: 1rem;
        background: var(--slate-50, #F8FAFC);
    }
    .info-section h4 {
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--text);
        margin: 0 0 0.5rem;
    }
    .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: var(--text-sm);
        padding: 0.3rem 0;
    }
    .info-row .label {
        color: var(--text-secondary);
    }
    .info-row .value {
        color: var(--text);
        font-weight: 500;
    }

    /* Allergy badges */
    .allergy-badge {
        display: inline-block;
        background: var(--danger-bg);
        border: 1px solid var(--danger-light);
        color: var(--danger);
        border-radius: var(--radius-full, 999px);
        padding: 0.0625rem 0.5rem;
        font-size: var(--text-xs);
        font-weight: 500;
        margin: 0.0625rem;
    }

    /* Status badges */
    .status-badge {
        display: inline-block;
        padding: 0.125rem 0.625rem;
        border-radius: var(--radius-full, 999px);
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: capitalize;
    }
    .status-confirmed {
        background: var(--success-bg);
        color: var(--success);
    }
    .status-pending {
        background: var(--warning-bg);
        color: var(--warning);
    }

    /* Media check */
    .media-check {
        margin-bottom: 1.5rem;
    }
    .media-check h3 {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--text);
        margin: 0 0 0.75rem;
    }
    .media-preview {
        display: flex;
        gap: 1.25rem;
        align-items: center;
    }
    .media-preview video {
        width: 200px;
        height: 150px;
        border-radius: 12px;
        background: var(--slate-800);
        object-fit: cover;
    }
    .media-status {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
    }
    .status-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: var(--text-sm);
        color: var(--text);
        font-weight: 500;
    }

    /* Dots */
    .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
    }
    .dot.green {
        background: var(--success);
        box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.15);
    }
    .dot.grey {
        background: var(--text-muted);
    }
    .dot.red {
        background: var(--danger);
        box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
    }

    /* Button */
    .btn {
        padding: 0.75rem 1.5rem;
        border-radius: var(--radius-md);
        font-weight: 600;
        font-size: 0.9375rem;
        cursor: pointer;
        border: none;
        min-height: 44px;
        transition: all var(--duration-fast) ease;
    }
    .btn-primary {
        background: var(--primary);
        color: var(--text-inverse, #fff);
    }
    .btn-primary:hover {
        background: var(--primary-hover);
        box-shadow: var(--shadow-glow);
    }
    .btn-block {
        width: 100%;
    }

    /* Error alert */
    .alert-error {
        background: var(--danger-bg);
        border: 1px solid var(--danger-light);
        color: var(--danger);
        padding: 0.75rem 1rem;
        border-radius: var(--radius-md);
        font-size: var(--text-base);
        margin-bottom: 1rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
        .page-container {
            padding: 1rem;
            padding-top: var(--navbar-height);
        }
        .join-card {
            padding: 1.5rem;
        }
        .media-preview {
            flex-direction: column;
            align-items: stretch;
        }
        .media-preview video {
            width: 100%;
            height: auto;
            aspect-ratio: 4/3;
        }
        .media-status {
            flex-direction: row;
            gap: 1.5rem;
        }
    }
</style>

<script>
    var apptData = null, mediaStream = null;

    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await fbDb.collection("users").doc(u.uid).get();
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "patient") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage(user);
    });

    async function initPage(user) {
        var apptID = sessionStorage.getItem("apptID");
        if (!apptID) { location.href = "/patient/appointments"; return; }

        var cfg = document.getElementById("svc-config").dataset;
        var token = await fbAuth.currentUser.getIdToken();

        try {
            var res = await fetch(cfg.apptUrl + "/appointment/" + apptID, { headers: { "Authorization": "Bearer " + token } });
            if (!res.ok) throw new Error();
            apptData = await res.json();

            document.getElementById("appt-info").innerHTML =
                '<h4>Appointment</h4>' +
                '<div class="info-row"><span class="label">ID</span><span class="value">' + (apptData.appointmentID || apptID) + '</span></div>' +
                '<div class="info-row"><span class="label">Date/Time</span><span class="value">' + new Date(apptData.dateTime).toLocaleString() + '</span></div>' +
                '<div class="info-row"><span class="label">Status</span><span class="status-badge status-' + apptData.status + '">' + apptData.status + '</span></div>';
        } catch(e) {
            document.getElementById("appt-info").innerHTML = '<p style="color:#b91c1c">Could not load appointment.</p>';
        }

        try {
            var pres = await fetch(cfg.patientUrl + "/patient/" + user.linkedID, { headers: { "Authorization": "Bearer " + token } });
            var pdata = await pres.json();
            var allergies = (pdata.allergies || []).map(function(a) { return '<span class="allergy-badge">' + a + '</span>'; }).join(" ") || "None";
            document.getElementById("patient-info").innerHTML =
                '<h4>Patient Information</h4>' +
                '<div class="info-row"><span class="label">Name</span><span class="value">' + (pdata.name || user.name) + '</span></div>' +
                '<div class="info-row"><span class="label">NRIC</span><span class="value">' + (pdata.NRIC || "N/A") + '</span></div>' +
                '<div class="info-row"><span class="label">Allergies</span><span>' + allergies + '</span></div>';
        } catch(e) {}

        // Media check
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById("preview-video").srcObject = mediaStream;
            document.querySelector("#cam-status .dot").className = "dot green";
            document.querySelector("#mic-status .dot").className = "dot green";
        } catch(e) {
            document.querySelector("#cam-status .dot").className = "dot red";
            document.querySelector("#mic-status .dot").className = "dot red";
        }
    }

    async function startConsultation() {
        if (!apptData) { return; }
        var btn = document.getElementById("join-btn");
        var errDiv = document.getElementById("join-error");
        errDiv.style.display = "none";
        btn.disabled = true; btn.textContent = "Connecting...";

        var cfg = document.getElementById("svc-config").dataset;
        try {
            if (mediaStream) { mediaStream.getTracks().forEach(function(t) { t.stop(); }); }
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.startConsultationUrl + "/start-consultation", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({
                    apptID: apptData.appointmentID || sessionStorage.getItem("apptID"),
                    patientID: window.currentUser.linkedID,
                    doctorID: apptData.doctorID
                })
            });
            var data = await res.json();
            if (!res.ok) throw new Error(data.error || data.message || "Failed to start consultation");
            sessionStorage.setItem("consultationData", JSON.stringify(data));
            location.href = "/patient/consultation";
        } catch(e) {
            errDiv.textContent = e.message;
            errDiv.style.display = "";
            btn.disabled = false; btn.textContent = "Join Consultation";
        }
    }
</script>
{% endblock %}
