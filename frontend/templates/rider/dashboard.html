{% extends "base.html" %}
{% block title %}Rider Dashboard - MediConnect{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header-row">
        <div>
            <h1 class="page-title" id="greeting"></h1>
            <p class="text-muted" id="date-line"></p>
        </div>
        <div class="location-status" id="loc-status">
            <span class="loc-dot grey"></span>
            <span id="loc-text">Location off</span>
        </div>
    </div>

    <div class="shift-panel">
        <div class="shift-title">Shift</div>
        <div class="shift-pills">
            <label class="shift-pill" data-shift="day"><input type="radio" name="rider-shift" value="day"><span>Day 07:00-19:00</span></label>
            <label class="shift-pill" data-shift="night"><input type="radio" name="rider-shift" value="night"><span>Night 19:00-07:00</span></label>
            <label class="shift-pill" data-shift="off"><input type="radio" name="rider-shift" value="off"><span>Off Shift</span></label>
        </div>
        <button class="btn btn-primary btn-sm" id="save-shift-btn" onclick="saveShift()">Save Shift</button>
    </div>

    <div class="stat-grid">
        <div class="stat-box"><div class="val" id="stat-active">0</div><div class="lbl">Active</div></div>
        <div class="stat-box"><div class="val" id="stat-available">0</div><div class="lbl">Available Jobs</div></div>
        <div class="stat-box"><div class="val" id="stat-completed">0</div><div class="lbl">Completed Today</div></div>
    </div>

    <!-- Active Delivery Banner -->
    <div class="active-delivery" id="active-delivery" style="display:none">
        <div class="active-header">
            <span class="pulse-dot"></span>
            <strong>Active Delivery</strong>
        </div>
        <div class="active-body" id="active-body"></div>
        <button class="btn btn-primary btn-block" onclick="goToDelivery()">View Delivery</button>
    </div>

    <!-- Available Jobs -->
    <div class="section-header">
        <h2>Available Jobs</h2>
        <span class="text-muted text-sm" id="refresh-info">Auto-refreshes every 15s | Showing jobs within 15km</span>
    </div>
    <div id="jobs-list">
        <div class="empty-state"><p class="text-muted">Checking for deliveries...</p></div>
    </div>
</div>

<style>
    .page-container{max-width:720px;margin:0 auto;padding:2rem 1.5rem;padding-top:calc(var(--navbar-height) + 2rem);font-family:var(--font);position:relative;z-index:10;animation:fadeIn 0.4s ease-out;}
    .page-header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem}
    .page-title{font-size:var(--text-2xl);font-weight:var(--weight-semibold);color:var(--text);margin:0;letter-spacing:-0.02em;}
    .text-muted{color:var(--text-secondary);font-size:var(--text-base);margin:.25rem 0 0}.text-sm{font-size:var(--text-sm)}
    .location-status{display:flex;align-items:center;gap:.375rem;background:rgba(255,255,255,0.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.8);border-radius:var(--radius-full);padding:.5rem 1rem;font-size:var(--text-xs);font-weight:var(--weight-semibold);color:var(--slate-700);box-shadow:var(--shadow-sm);}
    .loc-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
    .loc-dot.grey{background:var(--slate-400)}.loc-dot.green{background:var(--success);box-shadow:0 0 8px rgba(16,185,129,0.5);}.loc-dot.amber{background:var(--warning);box-shadow:0 0 8px rgba(245,158,11,0.5);}
    .shift-panel{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;background:rgba(255,255,255,0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.8);border-radius:var(--radius-xl);padding:1.25rem 1.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow-md)}
    .shift-title{font-size:var(--text-xs);font-weight:var(--weight-bold);text-transform:uppercase;letter-spacing:.04em;color:var(--slate-500)}
    .shift-pills{display:flex;gap:.5rem;flex-wrap:wrap;flex:1;}
    .shift-pill{border:1px solid rgba(226,232,240,0.8);border-radius:var(--radius-full);padding:.4rem .8rem;font-size:var(--text-xs);cursor:pointer;background:rgba(255,255,255,0.6);color:var(--slate-600);transition:all .15s;}
    .shift-pill input{display:none}
    .shift-pill.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary);font-weight:var(--weight-bold);box-shadow:0 2px 8px rgba(14,165,233,0.2);}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
    .stat-box{background:rgba(255,255,255,0.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.8);border-radius:var(--radius-xl);padding:1.5rem;text-align:center;box-shadow:var(--shadow-md);transition:transform .2s;}
    .stat-box:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
    .stat-box .val{font-size:var(--text-2xl);font-weight:var(--weight-bold);color:var(--slate-900)}.stat-box .lbl{font-size:var(--text-xs);font-weight:var(--weight-semibold);color:var(--slate-500);margin-top:.25rem}
    .active-delivery{background:linear-gradient(135deg,var(--warning-bg),#fef3c7);border:1px solid var(--warning-light);border-radius:var(--radius-xl);padding:1.5rem;margin-bottom:2rem;box-shadow:var(--shadow-md);}
    .active-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;font-size:var(--text-base);color:var(--warning-dark);font-weight:var(--weight-bold);}
    .pulse-dot{width:10px;height:10px;border-radius:50%;background:var(--warning);animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(1.2);}}
    .active-body{font-size:var(--text-sm);color:var(--warning-dark);margin-bottom:1rem}
    .active-body .row{display:flex;justify-content:space-between;padding:.375rem 0;border-bottom:1px solid rgba(245,158,11,0.2);}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
    .section-header h2{font-size:var(--text-xl);font-weight:var(--weight-bold);color:var(--slate-900);margin:0;letter-spacing:-0.02em;}
    .job-card{background:rgba(255,255,255,0.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.8);border-radius:var(--radius-xl);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-sm);transition:all .2s;}
    .job-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);background:rgba(255,255,255,0.95);border-color:#fff;}
    .job-info{flex:1}
    .job-id{font-weight:var(--weight-bold);font-size:var(--text-base);color:var(--slate-900)}.job-addr{font-size:var(--text-sm);color:var(--slate-600);margin-top:.25rem;font-weight:500;}
    .btn{padding:.625rem 1.25rem;border-radius:var(--radius-md);font-weight:var(--weight-semibold);font-size:var(--text-sm);cursor:pointer;border:none;min-height:40px;transition:all var(--duration-fast) var(--ease-bounce);font-family:var(--font);}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 2px 8px rgba(14,165,233,0.3);}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(14,165,233,0.4);}
    .btn-amber{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,0.3);}.btn-amber:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,158,11,0.4);}
    .btn-block{width:100%}
    .btn-sm{min-height:36px;padding:.375rem .75rem;font-size:var(--text-xs)}
    .empty-state{text-align:center;padding:3rem 2rem;background:rgba(255,255,255,0.5);backdrop-filter:blur(24px);border:1px dashed rgba(226,232,240,0.8);border-radius:var(--radius-xl);}
    @media(max-width:640px){.stat-grid{grid-template-columns:1fr 1fr 1fr;gap:.5rem}.stat-box{padding:.75rem}}
</style>

<script>
    var riderData = null, activeDelivery = null, watchId = null, currentLat = null, currentLng = null, pollTimer = null, lastLocSync = 0;

    fbAuth.onAuthStateChanged(async function(u) {
        if (!u) { location.href = "/auth/login"; return; }
        var snap = await (window._userDocPromise || fbDb.collection("users").doc(u.uid).get());
        if (!snap.exists) { await fbAuth.signOut(); location.href = "/auth/login"; return; }
        var user = snap.data();
        if (user.role !== "rider") { location.href = "/auth/login"; return; }
        window.currentUser = user;
        initPage(user);
    });

    function initPage(user) {
        var h = new Date().getHours();
        var greet = h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : "Good evening";
        document.getElementById("greeting").textContent = greet + ", " + (user.name || "Rider");
        document.getElementById("date-line").textContent = new Date().toLocaleDateString("en-SG", { weekday: "long", year: "numeric", month: "long", day: "numeric" });

        wireShiftInputs();
        loadRiderProfile();
        startLocationTracking();
        loadAvailableJobs();
        checkActiveDelivery();
        pollTimer = setInterval(loadAvailableJobs, 15000);
    }

    function wireShiftInputs() {
        document.querySelectorAll('input[name="rider-shift"]').forEach(function(i) {
            i.addEventListener("change", syncShiftPills);
        });
    }

    function syncShiftPills() {
        var selected = document.querySelector('input[name="rider-shift"]:checked');
        document.querySelectorAll(".shift-pill").forEach(function(pill) {
            pill.classList.toggle("active", !!selected && selected.value === pill.dataset.shift);
        });
    }

    async function loadRiderProfile() {
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.riderUrl + "/rider/" + encodeURIComponent(window.currentUser.linkedID), {
                headers: { "Authorization": "Bearer " + token }
            });
            if (!res.ok) return;
            var payload = await res.json();
            riderData = payload.data || payload || {};
            var shift = String(riderData.shift || "off").toLowerCase();
            var radio = document.querySelector('input[name="rider-shift"][value="' + shift + '"]');
            if (radio) radio.checked = true;
            syncShiftPills();
            loadAvailableJobs();
        } catch (_) {}
    }

    async function saveShift() {
        var selected = document.querySelector('input[name="rider-shift"]:checked');
        if (!selected) return;
        var btn = document.getElementById("save-shift-btn");
        setLoading(btn, true);
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.riderUrl + "/rider/" + encodeURIComponent(window.currentUser.linkedID) + "/shift", {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ shift: selected.value })
            });
            var data = await res.json();
            if (!res.ok) throw new Error(data.error || data.message || "Unable to update shift");
            riderData = data.data || riderData;
            showToast("Shift updated.");
            loadAvailableJobs();
        } catch (e) {
            showToast(e.message || "Unable to update shift.", "error");
        }
        setLoading(btn, false);
    }

    function startLocationTracking() {
        if (!navigator.geolocation) {
            document.getElementById("loc-text").textContent = "Not supported";
            return;
        }
        watchId = navigator.geolocation.watchPosition(
            function(pos) {
                currentLat = pos.coords.latitude;
                currentLng = pos.coords.longitude;
                document.querySelector("#loc-status .loc-dot").className = "loc-dot green";
                document.getElementById("loc-text").textContent = "Location active";
                syncRiderLocation();
            },
            function() {
                document.querySelector("#loc-status .loc-dot").className = "loc-dot amber";
                document.getElementById("loc-text").textContent = "Location denied";
            },
            { enableHighAccuracy: true, maximumAge: 30000 }
        );
    }

    async function syncRiderLocation() {
        if (!currentLat || !currentLng) return;
        var now = Date.now();
        if (now - lastLocSync < 20000) return;
        lastLocSync = now;
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            await fetch(cfg.riderUrl + "/rider/" + encodeURIComponent(window.currentUser.linkedID), {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ latitude: currentLat, longitude: currentLng })
            });
        } catch (_) {}
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
        var toRad = function(v) { return v * Math.PI / 180; };
        var dLat = toRad(lat2 - lat1);
        var dLon = toRad(lon2 - lon1);
        var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
        var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return 6371 * c;
    }

    async function checkActiveDelivery() {
        var active = sessionStorage.getItem("activeDelivery");
        if (!active) return;
        try {
            var data = JSON.parse(active);
            var cfg = document.getElementById("svc-config").dataset;
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.deliveryUrl + "/delivery/" + data.deliveryID, { headers: { "Authorization": "Bearer " + token } });
            if (!res.ok) { sessionStorage.removeItem("activeDelivery"); return; }
            var raw = await res.json();
            var delivery = raw.data || raw;
            var s = String(delivery.status || "").toLowerCase();
            if (s === "delivered" || s === "completed" || s === "refunded" || s === "cancelled") {
                sessionStorage.removeItem("activeDelivery");
                document.getElementById("active-delivery").style.display = "none";
                activeDelivery = null;
                document.getElementById("stat-active").textContent = "0";
                return;
            }
            activeDelivery = delivery;
            activeDelivery.deliveryID = data.deliveryID;
            document.getElementById("stat-active").textContent = "1";
            document.getElementById("active-delivery").style.display = "";
            document.getElementById("active-body").innerHTML =
                '<div class="row"><span>Delivery ID</span><span>' + data.deliveryID + '</span></div>' +
                '<div class="row"><span>Status</span><span>' + (delivery.status || "In Progress") + '</span></div>';
        } catch(e) { sessionStorage.removeItem("activeDelivery"); }
    }

    async function loadAvailableJobs() {
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var selectedShift = (document.querySelector('input[name="rider-shift"]:checked') || {}).value || (riderData && riderData.shift) || "off";
            if (String(selectedShift).toLowerCase() === "off") {
                document.getElementById("stat-available").textContent = "0";
                document.getElementById("jobs-list").innerHTML = '<div class="empty-state"><p class="text-muted">You are off shift. Switch to day/night to accept jobs.</p></div>';
                return;
            }

            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.deliveryUrl + "/delivery", { headers: { "Authorization": "Bearer " + token } });
            var data = await res.json();
            var deliveries = (Array.isArray(data) ? data : data.data || data.deliveries || []);
            var today = new Date().toISOString().split("T")[0];
            var completedToday = deliveries.filter(function(d) {
                var status = String(d.status || "").toLowerCase();
                if (!(status === "completed" || status === "delivered")) return false;
                var when = d.completedAt || d.updatedAt || d.createdAt || "";
                return String(when).slice(0, 10) === today;
            }).length;
            document.getElementById("stat-completed").textContent = completedToday;

            // DYNAMIC SYNC: Check if Rider has an actively assigned delivery (e.g. auto-assigned)
            var myLinkedID = window.currentUser.linkedID;
            var myActiveDelivery = deliveries.find(function(d) {
                var s = String(d.status || "").toLowerCase();
                var isActive = (s === "assigned" || s === "processing" || s === "delivering" || s === "enroute");
                return String(d.riderID) === String(myLinkedID) && isActive;
            });

            if (myActiveDelivery) {
                if (!activeDelivery || activeDelivery.deliveryID !== myActiveDelivery.deliveryID) {
                    sessionStorage.setItem("activeDelivery", JSON.stringify({ deliveryID: myActiveDelivery.deliveryID }));
                    checkActiveDelivery();
                }
            } else if (activeDelivery) {
                // Backend confirms no active delivery. Purge ghost cache.
                sessionStorage.removeItem("activeDelivery");
                document.getElementById("active-delivery").style.display = "none";
                document.getElementById("stat-active").textContent = "0";
                activeDelivery = null;
            }

            var pending = deliveries.filter(function(d) { return d.status === "pending" || d.status === "ready"; });
            var withDistance = pending.map(function(d) {
                var lat = Number(d.patientLat);
                var lng = Number(d.patientLng);
                var distance = null;
                if (!isNaN(lat) && !isNaN(lng) && currentLat !== null && currentLng !== null) {
                    distance = haversineKm(currentLat, currentLng, lat, lng);
                }
                d._distanceKm = distance;
                return d;
            });
            var filtered = withDistance.filter(function(d) {
                return d._distanceKm === null || d._distanceKm <= 15;
            });
            filtered.sort(function(a, b) {
                if (a._distanceKm === null && b._distanceKm === null) return 0;
                if (a._distanceKm === null) return 1;
                if (b._distanceKm === null) return -1;
                return a._distanceKm - b._distanceKm;
            });
            document.getElementById("stat-available").textContent = filtered.length;

            if (!filtered.length) {
                document.getElementById("jobs-list").innerHTML = '<div class="empty-state"><p class="text-muted">No deliveries available right now.</p></div>';
                return;
            }

            document.getElementById("jobs-list").innerHTML = filtered.map(function(d) {
                var id = d.deliveryID || d.id || d.DeliveryId || "";
                var distanceText = d._distanceKm === null ? "Distance unavailable" : (d._distanceKm.toFixed(1) + " km away");
                return '<div class="job-card">' +
                    '<div class="job-info"><div class="job-id">Delivery #' + id + '</div>' +
                    '<div class="job-addr">' + (d.address || d.patientAddress || "Address on accept") + '</div>' +
                    '<div class="job-addr">' + distanceText + '</div></div>' +
                    '<button class="btn btn-amber" onclick="acceptJob(\'' + id + '\')">Accept</button>' +
                    '</div>';
            }).join("");
        } catch(e) {
            document.getElementById("jobs-list").innerHTML = '<div class="empty-state"><p class="text-muted">Could not load jobs.</p></div>';
        }
    }

    async function acceptJob(deliveryID) {
        if (activeDelivery) { if (typeof showToast === "function") showToast("Complete current delivery first."); return; }
        var cfg = document.getElementById("svc-config").dataset;
        try {
            var token = await fbAuth.currentUser.getIdToken();
            var res = await fetch(cfg.assignDeliveryUrl + "/accept-delivery", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ deliveryID: deliveryID, riderID: window.currentUser.linkedID })
            });
            var data = await res.json();
            if (!res.ok) throw new Error(data.error || data.message || "Failed");
            sessionStorage.setItem("activeDelivery", JSON.stringify({ deliveryID: deliveryID }));
            location.href = "/rider/delivery";
        } catch(e) {
            if (typeof showToast === "function") showToast(e.message || "Could not accept delivery.");
        }
    }

    function goToDelivery() {
        location.href = "/rider/delivery";
    }
</script>
{% endblock %}
