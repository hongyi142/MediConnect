_format_version: "3.0"
_transform: true

services:
  # ──────────────────────────────────────────────
  #  Atomic / Core Services
  # ──────────────────────────────────────────────

  - name: patient-service
    url: http://patient-service:5030
    routes:
      - name: patient-routes
        paths:
          - /patient
        strip_path: false

  - name: doctor-service
    url: http://doctor-service:5031
    routes:
      - name: doctor-routes
        paths:
          - /doctor
          - /doctor-schedule
        strip_path: false

  - name: appointment-service
    url: http://appointment-service:5032
    routes:
      - name: appointment-routes
        paths:
          - /appointment
        strip_path: false

  - name: consultation-service
    url: http://consultation-service:5004
    routes:
      - name: consultation-routes
        paths:
          - /consultation
        strip_path: false
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  - name: inventory-service
    url: http://inventory-service:5005
    routes:
      - name: inventory-routes
        paths:
          - /inventory
        strip_path: false

  - name: mc-service
    url: http://mc-service:5010
    routes:
      - name: mc-routes
        paths:
          - /mc
        strip_path: false

  # ──────────────────────────────────────────────
  #  Wrapper / Integration Services
  # ──────────────────────────────────────────────

  - name: amazon-s3-wrapper
    url: http://amazon-s3-wrapper:5022
    routes:
      - name: amazon-s3-wrapper-routes
        paths:
          - /s3
        strip_path: true

  - name: twilio-wrapper
    url: http://twilio-wrapper:5020
    # Strict limit: each call sends a real SMS/call via Twilio — prevent billing abuse and phone spam
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          policy: local
          error_message: "Too many notification requests. Please wait before trying again."
    routes:
      - name: twilio-routes
        paths:
          - /twilio
        strip_path: false

  - name: openai-wrapper
    url: http://openai-wrapper:5021
    # Strict limit: each call hits the paid OpenAI API (symptom checker) — protect cost and prevent abuse
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          policy: local
          error_message: "Too many AI requests. Please wait before using the symptom checker again."
    routes:
      - name: openai-routes
        paths:
          - /openai
        strip_path: false

  - name: distance-matrix-wrapper
    url: http://distance-matrix-wrapper:5063
    routes:
      - name: distance-matrix-routes
        paths:
          - /distance-matrix
          - /geocode
        strip_path: false

  - name: notification-wrapper
    url: http://notification-wrapper:5011
    # Generous timeouts for the long-lived SSE stream connections
    connect_timeout: 10000
    write_timeout: 600000
    read_timeout: 600000
    routes:
      - name: notification-routes
        paths:
          - /notify
          - /sse
        strip_path: false

  - name: telegram-wrapper
    url: http://telegram-wrapper:5012
    routes:
      - name: telegram-routes
        paths:
          - /telegram-notify
        strip_path: true

  # ──────────────────────────────────────────────
  #  Payment Services
  #  payment_atomic and payment_wrapper both expose /payment/* routes,
  #  so we use unique Kong prefixes with strip_path to resolve conflicts.
  # ──────────────────────────────────────────────

  - name: payment-atomic
    url: http://payment_atomic:5000
    # Very strict limit: payment records are sensitive PHI — prevent enumeration and brute-force
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local
          error_message: "Too many payment requests. Please wait before trying again."
    routes:
      - name: payment-atomic-routes
        paths:
          - /payment-svc
        strip_path: true

  - name: payment-wrapper
    url: http://payment_wrapper:5001
    # Very strict limit: each call initiates a real payment transaction
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          policy: local
          error_message: "Too many payment requests. Please wait before trying again."
    routes:
      - name: payment-wrapper-routes
        paths:
          - /payment-gateway
        strip_path: true

  - name: process-payment
    url: http://process-payment:5002
    # Very strict limit: orchestrates the full payment + delivery flow
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          policy: local
          error_message: "Too many payment requests. Please wait before trying again."
    routes:
      - name: process-payment-routes
        paths:
          - /api
        strip_path: false

  # ──────────────────────────────────────────────
  #  Delivery Services
  #  Internal ports differ from previously-exposed host ports:
  #    delivery-service  → internal 5000
  #    rider-service     → internal 5001
  #    assign-delivery   → internal 5002
  #    complete-delivery → internal 5004
  # ──────────────────────────────────────────────

  - name: delivery-service
    url: http://delivery-service:5000
    routes:
      - name: delivery-routes
        paths:
          - /delivery
        strip_path: false

  - name: rider-service
    url: http://rider-service:5001
    routes:
      - name: rider-routes
        paths:
          - /rider
        strip_path: false

  - name: assign-delivery
    url: http://assign-delivery:5002
    routes:
      - name: assign-delivery-routes
        paths:
          - /accept-delivery
          - /nearest-rider
        strip_path: false

  - name: complete-delivery
    url: http://complete-delivery:5004
    routes:
      - name: complete-delivery-routes
        paths:
          - /complete-delivery
          - /prepare-delivery
        strip_path: false

  # ──────────────────────────────────────────────
  #  Composite / Orchestration Services
  # ──────────────────────────────────────────────

  - name: book-appointment
    url: http://book-appointment:5033
    # Strict limit: prevents patients from spamming appointment booking requests
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local
          error_message: "Too many booking requests. Please wait before trying again."
    routes:
      - name: book-appointment-routes
        paths:
          - /book-appointment
        strip_path: false

  - name: start-consultation
    url: http://start-consultation:5013
    # Moderate limit: consultation orchestration involves multiple downstream calls
    plugins:
      - name: rate-limiting
        config:
          minute: 20
          policy: local
          error_message: "Too many consultation requests. Please wait before trying again."
    routes:
      - name: start-consultation-routes
        paths:
          - /start-consultation
        strip_path: false

  - name: complete-consultation
    url: http://complete-consultation:5014
    # Moderate limit: matches start-consultation to prevent orphaned consultations
    plugins:
      - name: rate-limiting
        config:
          minute: 20
          policy: local
          error_message: "Too many consultation requests. Please wait before trying again."
    routes:
      - name: complete-consultation-routes
        paths:
          - /complete-consultation
          - /available-medications
        strip_path: false

  - name: tracking-service
    url: http://tracking-service:5050
    routes:
      - name: tracking-routes
        paths:
          - /socket.io
          - /rider-location
        strip_path: false

# ──────────────────────────────────────────────
#  Global Plugins
#
#  Rate-limiting strategy (defence-in-depth):
#    - Sensitive services have their own stricter limits (defined above):
#        /book-appointment  → 10 req/min   (prevent appointment spam)
#        /openai            → 5 req/min    (protect paid AI API)
#        /twilio            → 5 req/min    (prevent SMS/call abuse)
#        /payment-gateway   → 5 req/min    (protect payment transactions)
#        /api (payment)     → 5 req/min    (protect payment orchestration)
#        /payment-svc       → 10 req/min   (protect payment records)
#        /start-consultation→ 20 req/min   (protect consultation flow)
#        /complete-consult  → 20 req/min   (matches start-consultation)
#    - Global fallback: 500 req/min covers all remaining routes
# ──────────────────────────────────────────────
plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
        - Accept
      credentials: false
      max_age: 3600

  # Fallback rate limit — applies to any route without a service-level override
  - name: rate-limiting
    config:
      minute: 500
      policy: local
